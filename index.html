<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tea Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-50: #fff0f5;
    --pink-100: #ffd6e7;
    --pink-200: #ffadd2;
    --pink-400: #f472b6;
    --pink-600: #db2777;
    --pink-800: #9d174d;
    --rose-50: #fff1f2;
    --rose-100: #ffe4e6;
    --rose-200: #fecdd3;
    --rose-400: #fb7185;
    --rose-600: #e11d48;
    --green-50: #f0fdf4;
    --green-100: #dcfce7;
    --green-400: #4ade80;
    --green-600: #16a34a;
    --amber-50: #fffbeb;
    --amber-100: #fef3c7;
    --amber-400: #fbbf24;
    --amber-600: #d97706;
    --gray-50: #fafafa;
    --gray-100: #f4f4f5;
    --gray-200: #e4e4e7;
    --gray-400: #a1a1aa;
    --gray-600: #52525b;
    --gray-800: #27272a;
    --bg: #fffaf8;
    --surface: #fff;
    --text: #3d2b1f;
    --text-muted: #8b6b5e;
    --border: #f0d9d0;
    --accent: #e8789a;
    --accent-dark: #c9587a;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Lato', sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(200,100,130,0.08);
    --shadow-md: 0 4px 24px rgba(200,100,130,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── PASSWORD SCREEN ─────────────────────────────── */
  #pw-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #fff0f5 0%, #fce7f3 50%, #fff5f7 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0;
  }
  .pw-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px 40px;
    width: min(380px, 90vw);
    text-align: center;
    box-shadow: var(--shadow-md);
  }
  .pw-tea-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    animation: steam 3s ease-in-out infinite;
  }
  @keyframes steam {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .pw-title {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .pw-subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .pw-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--gray-50);
    outline: none;
    text-align: center;
    letter-spacing: 3px;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  .pw-input:focus { border-color: var(--accent); }
  .pw-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  .pw-btn:hover { background: var(--accent-dark); }
  .pw-btn:active { transform: scale(0.98); }
  .pw-error {
    color: var(--rose-600);
    font-size: 13px;
    margin-top: 10px;
    height: 18px;
  }

  /* ── APP WRAPPER ─────────────────────────────────── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.active { display: flex; }

  /* ── HEADER ──────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 12px rgba(200,100,130,0.07);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-icon { font-size: 20px; }
  nav {
    display: flex; gap: 4px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 0;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    padding: 8px 16px 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2.5px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    border-radius: 0;
  }
  .nav-btn:hover { color: var(--accent); }
  .nav-btn.active {
    color: var(--accent-dark);
    font-weight: 700;
    border-bottom-color: var(--accent);
  }

  /* ── MAIN ────────────────────────────────────────── */
  main { flex: 1; padding: 24px 20px 80px; max-width: 900px; width: 100%; margin: 0 auto; }

  /* ── PAGE SECTIONS ───────────────────────────────── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── HOME ────────────────────────────────────────── */
  .home-greeting {
    font-family: var(--font-display);
    font-size: 26px;
    margin-bottom: 4px;
    color: var(--text);
  }
  .home-greeting-sub {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 18px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.all::before { background: var(--accent); }
  .stat-card.nocaf::before { background: var(--green-600); }
  .stat-card.expiring::before { background: var(--amber-600); }
  .stat-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
    border-color: var(--pink-200);
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .stat-icon { font-size: 20px; margin-bottom: 6px; }
  .stat-number {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--text);
    line-height: 1;
  }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .section-title {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--text);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .pill {
    font-family: var(--font-body);
    font-size: 11px;
    background: var(--pink-100);
    color: var(--pink-800);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
  }

  /* ── TEA CARD (list) ─────────────────────────────── */
  .tea-list { display: flex; flex-direction: column; gap: 10px; }
  .tea-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.1s, border-color 0.2s;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .tea-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-1px);
    border-color: var(--pink-200);
  }
  .tea-color-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    background: var(--pink-50);
    border: 1px solid var(--border);
  }
  .tea-card-content { flex: 1; min-width: 0; }
  .tea-card-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tea-card-brand {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    white-space: nowrap;
  }
  .tag-type { background: var(--rose-100); color: var(--rose-600); }
  .tag-caf { background: var(--amber-100); color: var(--amber-600); }
  .tag-nocaf { background: var(--green-100); color: var(--green-600); }
  .tag-exp { background: var(--amber-50); color: var(--amber-600); border: 1px solid var(--amber-100); }
  .tag-exp.danger { background: var(--rose-100); color: var(--rose-600); border-color: var(--rose-200); }
  .tag-soldout { background: var(--gray-100); color: var(--gray-600); }
  .tag-flavor { background: var(--pink-50); color: var(--pink-600); }

  /* ── FILTER PANEL ────────────────────────────────── */
  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 18px;
  }
  .filter-bar-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .filter-rows { display: flex; flex-direction: column; gap: 10px; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 700; min-width: 60px; }
  .filter-chip {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    font-family: var(--font-body);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-chip:hover, .filter-chip.active {
    background: var(--pink-100);
    color: var(--pink-800);
    border-color: var(--pink-200);
  }
  .filter-chip.active { font-weight: 700; }
  .search-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--gray-50);
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .results-count {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* ── DETAIL PAGE ─────────────────────────────────── */
  .detail-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .back-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .detail-hero {
    padding: 32px 24px 24px;
    background: linear-gradient(135deg, var(--pink-50) 0%, var(--rose-50) 100%);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .detail-icon { font-size: 52px; margin-bottom: 12px; display: block; }
  .detail-name {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .detail-brand { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
  .detail-body { padding: 24px; }
  .detail-fields { display: flex; flex-direction: column; gap: 0; }
  .detail-field {
    display: flex;
    padding: 12px 0;
    border-bottom: 1px solid var(--gray-100);
    gap: 12px;
    align-items: flex-start;
  }
  .detail-field:last-child { border-bottom: none; }
  .detail-field-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 100px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding-top: 1px;
  }
  .detail-field-value { font-size: 14px; color: var(--text); flex: 1; }

  /* ── TODAY'S TEA LIST ────────────────────────────── */
  .menu-controls {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .menu-controls select {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    cursor: pointer;
  }
  .add-to-menu-btn {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-to-menu-btn:hover { background: var(--accent-dark); }
  .menu-paper {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    max-width: 600px;
    margin: 0 auto;
  }
  .menu-paper-header {
    background: linear-gradient(135deg, var(--pink-50) 0%, var(--rose-50) 100%);
    padding: 32px 24px 24px;
    text-align: center;
    border-bottom: 1.5px solid var(--border);
    position: relative;
  }
  .menu-paper-header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 10%; right: 10%;
    height: 1px;
    background: repeating-linear-gradient(90deg, var(--border) 0px, var(--border) 8px, transparent 8px, transparent 16px);
  }
  .menu-date {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .menu-title {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--text);
    font-style: italic;
    margin-bottom: 4px;
  }
  .menu-subtitle { font-size: 13px; color: var(--text-muted); font-style: italic; }
  .menu-divider {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 24px;
    background: var(--gray-50);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .menu-divider-line { flex: 1; height: 1px; background: var(--border); }
  .menu-divider-text { font-family: var(--font-display); font-size: 13px; color: var(--text-muted); font-style: italic; white-space: nowrap; }
  .menu-items { padding: 8px 24px 24px; }
  .menu-item {
    padding: 16px 0;
    border-bottom: 1px dashed var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .menu-item-dots {
    flex: 1;
    border-bottom: 1px dotted var(--border);
    margin-bottom: 3px;
  }
  .menu-item-name { font-family: var(--font-display); font-size: 17px; color: var(--text); white-space: nowrap; }
  .menu-item-brand { font-size: 12px; color: var(--accent); font-style: italic; white-space: nowrap; }
  .menu-item-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .menu-item-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .remove-from-menu {
    background: none; border: none;
    color: var(--gray-400); cursor: pointer;
    font-size: 14px; padding: 4px;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .remove-from-menu:hover { color: var(--rose-600); }
  .menu-empty {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-muted);
    font-style: italic;
    font-family: var(--font-display);
    font-size: 16px;
  }
  .print-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    margin: 16px auto 0;
  }
  .print-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── LOADING / EMPTY ─────────────────────────────── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted); font-style: italic;
  }
  .error-state {
    background: var(--rose-50);
    border: 1px solid var(--rose-200);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: var(--rose-600);
    font-size: 14px;
    margin-bottom: 16px;
  }

  /* ── ACTIVE FILTER INDICATOR ─────────────────────── */
  .active-filters {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 12px;
  }
  .active-filter-tag {
    display: flex; align-items: center; gap: 4px;
    background: var(--pink-100);
    color: var(--pink-800);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px 3px 10px;
    border-radius: 20px;
  }
  .active-filter-remove {
    background: none; border: none;
    color: var(--pink-600); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0 0 0 2px;
  }
  .clear-all-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
    font-size: 12px; color: var(--text-muted);
    cursor: pointer; transition: all 0.15s;
  }
  .clear-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── RESPONSIVE ──────────────────────────────────── */
  @media (max-width: 480px) {
    main { padding: 16px 14px 80px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .detail-field { flex-direction: column; gap: 2px; }
    .detail-field-label { min-width: unset; }
    .pw-card { padding: 36px 24px 32px; }
  }
  @media print {
    header, .menu-controls, .print-btn, .remove-from-menu, #pw-screen { display: none !important; }
    .page:not(#page-menu) { display: none !important; }
    #page-menu { display: block !important; }
    main { padding: 0; }
  }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="pw-screen">
  <div class="pw-card">
    <span class="pw-tea-icon">🍵</span>
    <h1 class="pw-title">My Tea Collection</h1>
    <p class="pw-subtitle">パスワードを入力してください</p>
    <input type="password" class="pw-input" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" onclick="checkPw()">入る ✦</button>
    <p class="pw-error" id="pw-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-top">
      <div class="logo"><span class="logo-icon">🌸</span> My Tea Collection</div>
    </div>
    <nav id="nav">
      <button class="nav-btn active" onclick="showPage('home',this)">Home</button>
      <button class="nav-btn" onclick="showPage('list',this)">紅茶一覧</button>
      <button class="nav-btn" onclick="showPage('menu',this)">Today's Tea List</button>
    </nav>
  </header>

  <main>
    <!-- HOME -->
    <section class="page active" id="page-home">
      <h2 class="home-greeting">Good morning ☕</h2>
      <p class="home-greeting-sub" id="home-date"></p>
      <div class="stats-grid" id="stats-grid">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
      <h3 class="section-title">
        <span>もうすぐ賞味期限</span>
        <span class="pill" id="expiring-count-badge">–</span>
      </h3>
      <div id="home-expiring-list" class="tea-list">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
    </section>

    <!-- LIST -->
    <section class="page" id="page-list">
      <input type="text" class="search-input" id="list-search" placeholder="🔍  商品名・ブランドで検索…" oninput="applyFilters()">
      <div class="filter-bar">
        <div class="filter-bar-title" onclick="toggleFilters()">
          <span>フィルター</span>
          <span id="filter-toggle-icon">▼</span>
        </div>
        <div class="filter-rows" id="filter-rows"></div>
      </div>
      <div class="active-filters" id="active-filters-display"></div>
      <p class="results-count" id="results-count"></p>
      <div id="list-container" class="tea-list">
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
    </section>

    <!-- DETAIL -->
    <section class="page" id="page-detail">
      <div class="detail-header">
        <button class="back-btn" onclick="goBack()">← 戻る</button>
      </div>
      <div id="detail-content"></div>
    </section>

    <!-- TODAY'S TEA MENU -->
    <section class="page" id="page-menu">
      <div class="menu-controls">
        <select id="menu-select">
          <option value="">紅茶を選んでメニューに追加…</option>
        </select>
        <button class="add-to-menu-btn" onclick="addToMenu()">追加 ＋</button>
      </div>
      <div class="menu-paper">
        <div class="menu-paper-header">
          <p class="menu-date" id="menu-date-display"></p>
          <h2 class="menu-title">Today's Tea List</h2>
          <p class="menu-subtitle">— お好みの一杯をどうぞ —</p>
        </div>
        <div class="menu-divider">
          <div class="menu-divider-line"></div>
          <span class="menu-divider-text">本日のセレクション</span>
          <div class="menu-divider-line"></div>
        </div>
        <div class="menu-items" id="menu-items">
          <p class="menu-empty">紅茶を選んでメニューに追加してください 🌸</p>
        </div>
      </div>
      <button class="print-btn" onclick="window.print()">🖨 印刷する</button>
    </section>
  </main>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1qMVoiJ7paL9DLLmfiMalRJaqK3mcNfkVujDAojlehIaY1bogsofhBgmhxAwZ1LalxmRcyJ8oK6Wk/pub?gid=0&single=true&output=csv';
const PASSWORD = 'Lkun';

let teaData = [];
let columns = [];
let filters = {};
let filtersOpen = true;
let menuItems = [];
let prevPage = 'home';
let currentDetailId = null;

// ── PASSWORD ──────────────────────────────────────────────
function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === PASSWORD) {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    init();
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

// ── INIT ──────────────────────────────────────────────────
async function init() {
  setDates();
  await loadData();
}

function setDates() {
  const now = new Date();
  const opts = { year:'numeric', month:'long', day:'numeric', weekday:'long' };
  document.getElementById('home-date').textContent = now.toLocaleDateString('ja-JP', opts);
  document.getElementById('menu-date-display').textContent = now.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
}

// ── CSV LOAD ──────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    parseCSV(text);
    buildUI();
  } catch(e) {
    showError('データの読み込みに失敗しました。スプレッドシートが公開設定になっているか確認してください。');
  }
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (!lines.length) return;
  columns = parseLine(lines[0]);
  teaData = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseLine(lines[i]);
    if (!vals.some(v => v.trim())) continue;
    const obj = {};
    columns.forEach((col, j) => { obj[col] = (vals[j] || '').trim(); });
    obj._id = i;
    teaData.push(obj);
  }
}

function parseLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function showError(msg) {
  const err = `<div class="error-state">${msg}</div>`;
  document.getElementById('stats-grid').innerHTML = err;
  document.getElementById('home-expiring-list').innerHTML = '';
  document.getElementById('list-container').innerHTML = err;
}

// ── COLUMN HELPERS ────────────────────────────────────────
function col(key) {
  // fuzzy match column names
  const map = {
    name: ['商品名','name','名前','品名','tea name','ティー名'],
    brand: ['ブランド','brand','メーカー'],
    type: ['茶種','種類','type','tea type'],
    flavor: ['フレーバー','flavor','フレーバー名'],
    caffeine: ['カフェイン','caffeine','カフェイン量'],
    expiry: ['賞味期限','expiry','best before','exp','期限'],
    opened: ['開封日','opened','開封'],
    soldout: ['完売','sold out','soldout','在庫'],
    description: ['説明','description','desc','メモ','note'],
    country: ['産地','country','origin','産国'],
    quantity: ['数量','quantity','qty','個数'],
    price: ['価格','price','値段'],
    purchase: ['購入日','purchase','purchased'],
    rating: ['評価','rating','rate'],
  };
  const keys = map[key] || [key];
  return columns.find(c => keys.some(k => c.toLowerCase().includes(k.toLowerCase()))) || null;
}

function get(tea, key) {
  const c = col(key);
  return c ? (tea[c] || '') : '';
}

function isSoldOut(tea) {
  const v = get(tea, 'soldout').toLowerCase();
  return v === '在庫なし' || v === 'sold out' || v === 'soldout' || v === 'yes' || v === '完売';
}

function isNoCaffeine(tea) {
  const v = get(tea, 'caffeine').toLowerCase();
  return v.includes('ノンカフェイン') || v.includes('none') || v === '0' || v.includes('decaf') || v.includes('なし') || v === 'no';
}

function parseExpiry(tea) {
  const v = get(tea, 'expiry');
  if (!v) return null;
  // Try various date formats
  const cleaned = v.replace(/年/,'-').replace(/月/,'-').replace(/日/,'');
  const d = new Date(cleaned);
  if (!isNaN(d)) return d;
  return null;
}

function isExpiringThisMonth(tea) {
  const d = parseExpiry(tea);
  if (!d) return false;
  const now = new Date();
  // Include expired (past) and current month + next month
  const endOfNextMonth = new Date(now.getFullYear(), now.getMonth() + 2, 0);
  return d <= endOfNextMonth;
}

function getTeaEmoji(tea) {
  const t = get(tea,'type').toLowerCase();
  const f = get(tea,'flavor').toLowerCase();
  if (t.includes('green') || t.includes('緑') || t.includes('抹茶')) return '🍵';
  if (t.includes('herb') || f.includes('カモミール') || f.includes('chamomile')) return '🌼';
  if (t.includes('fruit') || f.includes('フルーツ') || f.includes('berry') || f.includes('ベリー')) return '🍓';
  if (t.includes('flower') || f.includes('rose') || f.includes('ローズ')) return '🌹';
  if (t.includes('mint') || f.includes('ミント') || f.includes('peppermint')) return '🌿';
  if (t.includes('chai') || f.includes('スパイス') || f.includes('spice')) return '✨';
  return '🫖';
}

// ── BUILD UI ──────────────────────────────────────────────
function buildUI() {
  buildStats();
  buildHomeExpiring();
  buildFilters();
  buildList();
  buildMenuSelect();
}

// HOME STATS
function buildStats() {
  const total = teaData.filter(t => !isSoldOut(t)).length;
  const nocaf = teaData.filter(t => !isSoldOut(t) && isNoCaffeine(t)).length;
  const expiring = teaData.filter(t => !isSoldOut(t) && isExpiringThisMonth(t)).length;
  document.getElementById('expiring-count-badge').textContent = expiring;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card all" onclick="filterQuick('all')">
      <div class="stat-icon">🫖</div>
      <div class="stat-label">全コレクション</div>
      <div class="stat-number">${total}</div>
      <div class="stat-sub">アイテム</div>
    </div>
    <div class="stat-card nocaf" onclick="filterQuick('nocaf')">
      <div class="stat-icon">🌿</div>
      <div class="stat-label">ノンカフェイン</div>
      <div class="stat-number">${nocaf}</div>
      <div class="stat-sub">アイテム</div>
    </div>
    <div class="stat-card expiring" onclick="filterQuick('expiring')">
      <div class="stat-icon">📅</div>
      <div class="stat-label">もうすぐ期限</div>
      <div class="stat-number">${expiring}</div>
      <div class="stat-sub">当月・翌月まで</div>
    </div>
  `;
}

function filterQuick(type) {
  filters = {};
  if (type === 'nocaf') filters['_nocaf'] = true;
  if (type === 'expiring') filters['_expiring'] = true;
  document.getElementById('list-search').value = '';
  showPage('list', document.querySelectorAll('.nav-btn')[1]);
  applyFilters();
}

// HOME EXPIRING
function buildHomeExpiring() {
  const now = new Date();
  const endOfThisMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  const items = teaData.filter(t => {
    if (isSoldOut(t)) return false;
    const d = parseExpiry(t);
    if (!d) return false;
    return d <= endOfThisMonth;
  }).sort((a,b) => (parseExpiry(a)||0) - (parseExpiry(b)||0));
  const el = document.getElementById('home-expiring-list');
  if (!items.length) { el.innerHTML = '<p class="empty-state">当月内に期限を迎える紅茶はありません ✨</p>'; return; }
  el.innerHTML = items.slice(0,5).map(t => teaCardHTML(t)).join('');
}

// FILTER PANEL
function buildFilters() {
  const filterKeys = [
    { key: 'brand', label: 'ブランド' },
    { key: 'caffeine', label: 'カフェイン' },
    { key: 'type', label: '茶種' },
    { key: 'flavor', label: 'フレーバー' },
  ];
  const soldoutKey = col('soldout');
  let html = '';
  for (const { key, label } of filterKeys) {
    const c = col(key);
    if (!c) continue;
    const vals = [...new Set(teaData.map(t => t[c]).filter(v => v && v.trim()))].sort();
    if (!vals.length) continue;
    html += `<div class="filter-row">
      <span class="filter-label">${label}</span>
      ${vals.map(v => `<button class="filter-chip" data-key="${c}" data-val="${escHtml(v)}" onclick="toggleFilter(this,'${c}','${escJs(v)}')">${escHtml(v)}</button>`).join('')}
    </div>`;
  }
  // Date-based filters
  html += `<div class="filter-row">
    <span class="filter-label">賞味期限</span>
    <button class="filter-chip" data-key="_expiring" onclick="toggleSpecialFilter(this,'_expiring')">当月・翌月まで</button>
    <button class="filter-chip" data-key="_expired" onclick="toggleSpecialFilter(this,'_expired')">期限切れ含む</button>
  </div>`;
  // Soldout filter
  if (soldoutKey) {
    html += `<div class="filter-row">
      <span class="filter-label">在庫</span>
      <button class="filter-chip" data-key="_showsoldout" onclick="toggleSpecialFilter(this,'_showsoldout')">在庫なし含む全件</button>
    </div>`;
  }
  document.getElementById('filter-rows').innerHTML = html;
}

function toggleFilters() {
  filtersOpen = !filtersOpen;
  document.getElementById('filter-rows').style.display = filtersOpen ? '' : 'none';
  document.getElementById('filter-toggle-icon').textContent = filtersOpen ? '▲' : '▼';
}

function toggleFilter(btn, key, val) {
  if (!filters[key]) filters[key] = new Set();
  if (filters[key].has(val)) {
    filters[key].delete(val);
    if (!filters[key].size) delete filters[key];
  } else {
    filters[key].add(val);
  }
  btn.classList.toggle('active');
  applyFilters();
}

function toggleSpecialFilter(btn, key) {
  if (filters[key]) { delete filters[key]; btn.classList.remove('active'); }
  else { filters[key] = true; btn.classList.add('active'); }
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('list-search').value.toLowerCase().trim();
  const showSoldOut = !!filters['_showsoldout'];
  const filtered = teaData.filter(t => {
    if (!showSoldOut && isSoldOut(t)) return false;
    if (filters['_nocaf'] && !isNoCaffeine(t)) return false;
    if (filters['_expiring'] && !isExpiringThisMonth(t)) return false;
    if (filters['_expired']) { /* show all including expired – no filter */ }
    for (const [key, vals] of Object.entries(filters)) {
      if (key.startsWith('_')) continue;
      if (vals instanceof Set) {
        if (!vals.has(t[key])) return false;
      }
    }
    if (search) {
      const name = (get(t,'name') + ' ' + get(t,'brand')).toLowerCase();
      if (!name.includes(search)) return false;
    }
    return true;
  });
  renderList(filtered);
  renderActiveFilters();
}

function renderActiveFilters() {
  const el = document.getElementById('active-filters-display');
  let html = '';
  for (const [key, val] of Object.entries(filters)) {
    if (key === '_showsoldout') { html += `<span class="active-filter-tag">在庫なし含む<button class="active-filter-remove" onclick="clearSpecialFilter('${key}')">×</button></span>`; continue; }
    if (key === '_nocaf') { html += `<span class="active-filter-tag">ノンカフェイン<button class="active-filter-remove" onclick="clearSpecialFilter('${key}')">×</button></span>`; continue; }
    if (key === '_expiring') { html += `<span class="active-filter-tag">もうすぐ期限<button class="active-filter-remove" onclick="clearSpecialFilter('${key}')">×</button></span>`; continue; }
    if (key === '_expired') { html += `<span class="active-filter-tag">期限切れ含む<button class="active-filter-remove" onclick="clearSpecialFilter('${key}')">×</button></span>`; continue; }
    if (val instanceof Set) {
      val.forEach(v => {
        html += `<span class="active-filter-tag">${escHtml(v)}<button class="active-filter-remove" onclick="clearFilterVal('${escJs(key)}','${escJs(v)}')">×</button></span>`;
      });
    }
  }
  if (html) html += `<button class="clear-all-btn" onclick="clearAllFilters()">すべてクリア</button>`;
  el.innerHTML = html;
}

function clearFilterVal(key, val) {
  if (filters[key]) { filters[key].delete(val); if (!filters[key].size) delete filters[key]; }
  // uncheck chip
  document.querySelectorAll(`.filter-chip[data-key="${key}"][data-val="${val}"]`).forEach(b => b.classList.remove('active'));
  applyFilters();
}
function clearSpecialFilter(key) {
  delete filters[key];
  document.querySelectorAll(`.filter-chip[data-key="${key}"]`).forEach(b => b.classList.remove('active'));
  applyFilters();
}
function clearAllFilters() {
  filters = {};
  document.querySelectorAll('.filter-chip.active').forEach(b => b.classList.remove('active'));
  document.getElementById('list-search').value = '';
  applyFilters();
}

// BUILD LIST
function buildList() {
  const visible = teaData.filter(t => !isSoldOut(t));
  renderList(visible);
}

function renderList(items) {
  const el = document.getElementById('list-container');
  document.getElementById('results-count').textContent = `${items.length} 件表示中`;
  if (!items.length) { el.innerHTML = '<p class="empty-state">条件に合う紅茶が見つかりません 🌸</p>'; return; }
  el.innerHTML = items.map(t => teaCardHTML(t)).join('');
}

function teaCardHTML(t) {
  const name = get(t,'name') || '(名称なし)';
  const brand = get(t,'brand');
  const type = get(t,'type');
  const caffeine = get(t,'caffeine');
  const expiry = get(t,'expiry');
  const sold = isSoldOut(t);
  const nocaf = isNoCaffeine(t);
  const flavor = get(t,'flavor');
  let tags = '';
  if (type) tags += `<span class="tag tag-type">${escHtml(type)}</span>`;
  if (nocaf) tags += `<span class="tag tag-nocaf">ノンカフェイン</span>`;
  else if (caffeine) tags += `<span class="tag tag-caf">${escHtml(caffeine)}</span>`;
  if (flavor) tags += `<span class="tag tag-flavor">${escHtml(flavor)}</span>`;
  if (expiry) {
    const d = parseExpiry(t);
    const now = new Date();
    const danger = d && d < now;
    tags += `<span class="tag tag-exp${danger?' danger':''}">${escHtml(expiry)}</span>`;
  }
  if (sold) tags += `<span class="tag tag-soldout">在庫なし</span>`;
  return `<div class="tea-card" onclick="showDetail(${t._id})">
    <div class="tea-color-dot">${getTeaEmoji(t)}</div>
    <div class="tea-card-content">
      <div class="tea-card-name">${escHtml(name)}</div>
      ${brand ? `<div class="tea-card-brand">${escHtml(brand)}</div>` : ''}
      <div class="tags">${tags}</div>
    </div>
  </div>`;
}

// DETAIL
function showDetail(id) {
  prevPage = document.querySelector('.nav-btn.active')?.getAttribute('onclick')?.match(/showPage\('(\w+)'/)?.[1] || 'list';
  const tea = teaData.find(t => t._id === id);
  if (!tea) return;
  currentDetailId = id;
  const el = document.getElementById('detail-content');
  const fields = columns.map(c => {
    const v = tea[c];
    if (!v || !v.trim()) return '';
    return `<div class="detail-field">
      <span class="detail-field-label">${escHtml(c)}</span>
      <span class="detail-field-value">${escHtml(v)}</span>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="detail-card">
      <div class="detail-hero">
        <span class="detail-icon">${getTeaEmoji(tea)}</span>
        <h2 class="detail-name">${escHtml(get(tea,'name') || '(名称なし)')}</h2>
        ${get(tea,'brand') ? `<p class="detail-brand">${escHtml(get(tea,'brand'))}</p>` : ''}
        <div class="tags" style="justify-content:center;gap:6px;">
          ${get(tea,'type') ? `<span class="tag tag-type">${escHtml(get(tea,'type'))}</span>` : ''}
          ${isNoCaffeine(tea) ? `<span class="tag tag-nocaf">ノンカフェイン</span>` : (get(tea,'caffeine') ? `<span class="tag tag-caf">${escHtml(get(tea,'caffeine'))}</span>` : '')}
        </div>
      </div>
      <div class="detail-body">
        <div class="detail-fields">${fields}</div>
      </div>
    </div>
  `;
  showPage('detail', null);
}

function goBack() {
  showPage(prevPage, document.querySelectorAll('.nav-btn')[prevPage==='menu'?2:prevPage==='list'?1:0]);
}

// MENU SELECT
function buildMenuSelect() {
  const sel = document.getElementById('menu-select');
  const opts = teaData.filter(t => !isSoldOut(t)).map(t =>
    `<option value="${t._id}">${escHtml(get(t,'name') || '(名称なし)')}${get(t,'brand') ? ' — ' + get(t,'brand') : ''}</option>`
  ).join('');
  sel.innerHTML = '<option value="">紅茶を選んでメニューに追加…</option>' + opts;
}

function addToMenu() {
  const sel = document.getElementById('menu-select');
  const id = parseInt(sel.value);
  if (!id) return;
  if (menuItems.some(m => m._id === id)) {
    alert('すでにメニューに追加されています');
    return;
  }
  const tea = teaData.find(t => t._id === id);
  if (!tea) return;
  menuItems.push(tea);
  renderMenu();
  sel.value = '';
}

function removeFromMenu(id) {
  menuItems = menuItems.filter(m => m._id !== id);
  renderMenu();
}

function renderMenu() {
  const el = document.getElementById('menu-items');
  if (!menuItems.length) {
    el.innerHTML = '<p class="menu-empty">紅茶を選んでメニューに追加してください 🌸</p>';
    return;
  }
  el.innerHTML = menuItems.map(t => {
    const name = get(t,'name') || '(名称なし)';
    const brand = get(t,'brand');
    const desc = get(t,'description') || get(t,'flavor') || get(t,'type') || '';
    const type = get(t,'type');
    const caf = isNoCaffeine(t) ? 'ノンカフェイン' : get(t,'caffeine');
    return `<div class="menu-item">
      <div class="menu-item-header">
        <span class="menu-item-name">${escHtml(name)}</span>
        <span class="menu-item-dots"></span>
        <span class="menu-item-brand">${escHtml(brand)}</span>
        <button class="remove-from-menu" onclick="removeFromMenu(${t._id})" title="削除">✕</button>
      </div>
      ${desc ? `<div class="menu-item-desc">${escHtml(desc)}</div>` : ''}
      <div class="menu-item-tags">
        ${type ? `<span class="tag tag-type" style="font-size:11px">${escHtml(type)}</span>` : ''}
        ${caf ? `<span class="tag ${isNoCaffeine(t)?'tag-nocaf':'tag-caf'}" style="font-size:11px">${escHtml(caf)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// PAGE NAV
function showPage(name, btnEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name)?.classList.add('active');
  if (btnEl) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
  }
  if (name === 'list' && teaData.length) applyFilters();
}

// HELPERS
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s).replace(/'/g,"\\'").replace(/\\/g,'\\\\');
}
</script>
