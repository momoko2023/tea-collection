<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Tea Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #faf7f4;
  color: #2c2420;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

:root {
  --tea-deep: #7a3f3f;
  --tea-mid: #b06060;
  --tea-rose: #dea8a8;
  --tea-blush: #f5e8e8;
  --tea-cream: #faf7f4;
  --tea-ink: #2c2420;
  --tea-gray: #8a7f7a;
  --shadow-sm: 0 1px 3px rgba(122,63,63,0.08);
  --shadow-md: 0 4px 16px rgba(122,63,63,0.12);
  --radius-md: 14px;
  --radius-lg: 20px;
  --font-display: 'Cormorant Garamond', serif;
}

/* ===== PASSWORD SCREEN ===== */
#pw-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: linear-gradient(160deg, #fdf8f3 0%, #f5e8e8 40%, #ede8f5 100%);
}
.pw-container { text-align: center; animation: fadeUp 0.6s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.pw-title { font-family: var(--font-display); font-size: 42px; font-weight: 300; color: var(--tea-deep); margin-bottom: 2rem; }
.pw-input-wrap input {
  width: 100%; max-width: 280px; padding: 12px; border: 1.5px solid var(--tea-rose);
  border-radius: 30px; text-align: center; margin-bottom: 12px; outline: none;
}
.pw-btn {
  width: 280px; padding: 12px; background: var(--tea-deep); color: white;
  border: none; border-radius: 30px; cursor: pointer; letter-spacing: 0.1em;
}

/* ===== NAV ===== */
#main-app { display: none; max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }
.nav {
  position: sticky; top: 0; z-index: 100; background: rgba(250,247,244,0.92);
  backdrop-filter: blur(12px); border-bottom: 1px solid rgba(222,168,168,0.3);
  padding: 0 12px; display: flex; align-items: center; justify-content: space-between; height: 56px;
}
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  padding: 6px 12px; border-radius: 16px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: none; background: #eee; color: var(--tea-gray);
}
.nav-tab.active { background: var(--tea-deep); color: white; }

/* ===== PAGES ===== */
.page { display: none; padding-bottom: 40px; }
.page.active { display: block; animation: pageIn 0.3s ease both; }
@keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== HOME: STATS ===== */
.home-hero { padding: 2rem 1.5rem; text-align: center; background: linear-gradient(160deg, #fdf8f3 0%, #f8eaec 100%); }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 1rem; }
.stat-card {
  background: white; border-radius: var(--radius-md); padding: 15px 5px;
  text-align: center; border: 1px solid rgba(222,168,168,0.3); cursor: pointer; transition: 0.2s;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.stat-num { font-family: var(--font-display); font-size: 28px; color: var(--tea-deep); }
.stat-label { font-size: 9px; color: var(--tea-gray); text-transform: uppercase; margin-top: 4px; }

/* ===== LIST: DROPDOWNS ===== */
.list-header { padding: 12px; position: sticky; top: 56px; background: white; z-index: 90; border-bottom: 1px solid #eee; }
.search-wrap { background: #f9f6f3; border-radius: 20px; padding: 8px 15px; margin-bottom: 10px; display: flex; }
.search-wrap input { border: none; background: transparent; width: 100%; outline: none; font-size: 14px; }
.filter-dropdowns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.filter-select {
  padding: 8px; border-radius: 10px; border: 1px solid var(--tea-rose);
  font-size: 12px; color: var(--tea-deep); background: white; outline: none;
}

/* ===== TEA CARD & SELECTION ===== */
.tea-list { padding: 12px; }
.tea-card {
  background: white; border-radius: var(--radius-md); padding: 12px;
  margin-bottom: 12px; border: 1px solid #eee; display: flex; gap: 12px; align-items: flex-start;
}
.select-checkbox { width: 20px; height: 20px; accent-color: var(--tea-deep); cursor: pointer; margin-top: 4px; }
.card-content { flex: 1; cursor: pointer; }
.card-name { font-family: var(--font-display); font-size: 18px; font-style: italic; }

/* ===== MENU PAGE (Restaurant Style) ===== */
.menu-container {
  padding: 40px 30px; background: #fffcf9; min-height: 80vh; margin: 20px;
  border: 1px solid #e0d5c5; position: relative;
}
.menu-container::after {
  content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
  border: 1px solid #e0d5c5; pointer-events: none;
}
.menu-title {
  text-align: center; font-family: var(--font-display); font-size: 32px;
  color: var(--tea-deep); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px;
}
.menu-item { margin-bottom: 25px; text-align: center; }
.menu-item-name {
  font-family: 'Noto Serif JP', serif; font-weight: 500; font-size: 16px;
  margin-bottom: 5px; color: #333; position: relative; display: inline-block;
}
.menu-item-desc { font-family: 'Noto Serif JP', serif; font-size: 12px; color: #777; line-height: 1.6; max-width: 80%; margin: 0 auto; }

/* ===== RECOMMENDATION (Home) ===== */
.home-section { padding: 1rem; }
.section-title { font-family: var(--font-display); font-size: 20px; color: var(--tea-deep); margin-bottom: 10px; border-bottom: 1px solid var(--tea-blush); }
.rec-box { background: var(--tea-blush); padding: 15px; border-radius: var(--radius-md); border-left: 4px solid var(--tea-deep); }
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-container">
    <h1 class="pw-title">Tea Library</h1>
    <div class="pw-input-wrap"><input type="password" id="pw-input" placeholder="Password"></div>
    <button class="pw-btn" onclick="checkPw()">Login</button>
    <p id="pw-error" style="color:red; margin-top:10px; font-size:12px;"></p>
  </div>
</div>

<div id="main-app">
  <nav class="nav">
    <div style="font-family:var(--font-display); font-style:italic; color:var(--tea-deep)">Tea Selection</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('home', this)">Home</button>
      <button class="nav-tab" onclick="showPage('list', this)">一覧</button>
      <button class="nav-tab" onclick="showPage('menu', this)">Menu</button>
    </div>
  </nav>

  <div id="page-home" class="page active">
    <div class="home-hero">
      <h1 style="font-family:var(--font-display); font-style:italic;">Welcome Back</h1>
      <p id="home-date" style="font-size:12px; color:var(--tea-gray)"></p>
    </div>
    <div class="stats-grid">
      <div class="stat-card" onclick="jumpToList('all')">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card" onclick="jumpToList('decaf')">
        <div class="stat-num" id="stat-decaf">0</div>
        <div class="stat-label">Decaf</div>
      </div>
      <div class="stat-card" onclick="jumpToList('expiry')">
        <div class="stat-num" id="stat-near">0</div>
        <div class="stat-label">Soon</div>
      </div>
    </div>

    <div class="home-section" id="section-expiry">
      <div class="section-title">This Month's Expiry</div>
      <div id="expiry-list"></div>
    </div>

    <div class="home-section" id="section-recommend">
      <div class="section-title">Today's Recommend</div>
      <div id="recommend-box" class="rec-box"></div>
    </div>
  </div>

  <div id="page-list" class="page">
    <div class="list-header">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search tea..." oninput="filterTeas()">
      </div>
      <div class="filter-dropdowns">
        <select id="filter-brand" class="filter-select" onchange="filterTeas()"><option value="">すべてのブランド</option></select>
        <select id="filter-type" class="filter-select" onchange="filterTeas()"><option value="">すべての茶種</option></select>
      </div>
    </div>
    <div id="tea-list" class="tea-list"></div>
  </div>

  <div id="page-menu" class="page">
    <div class="menu-container">
      <div class="menu-title">Today's Tea List</div>
      <div id="menu-items-container"></div>
    </div>
  </div>

  <div id="page-detail" class="page">
    <div style="padding:15px; cursor:pointer; color:var(--tea-deep)" onclick="showPage('list')">← Back to List</div>
    <div id="detail-content" style="padding:20px;"></div>
  </div>
</div>

<script>
const CONFIG = {
  PASSWORD: 'Lkun',
  SHEET_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1qMVoiJ7paL9DLLmfiMalRJaqK3mcNfkVujDAojlehIaY1bogsofhBgmhxAwZ1LalxmRcyJ8oK6Wk/pub?gid=0&single=true&output=csv',
  NAME_COL: '商品名',
  DESC_COL: '説明',
  BRAND_COL: 'ブランド',
  TYPE_COL: '茶種',
  EXPIRY_COL: '賞味期限',
  OPEN_COL: '開封日',
  CAFFEINE_COL: 'カフェイン量'
};

let allTeas = [];
let selectedTeaIds = new Set();

function checkPw() {
  if (document.getElementById('pw-input').value === CONFIG.PASSWORD) {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-error').textContent = 'Invalid Password';
  }
}

async function init() {
  const now = new Date();
  document.getElementById('home-date').textContent = now.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
  await fetchData();
}

async function fetchData() {
  const res = await fetch(CONFIG.SHEET_URL + '&t=' + Date.now());
  const text = await res.text();
  allTeas = parseCSV(text);
  
  populateDropdowns();
  renderHome();
  renderTeaList(allTeas);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).map((line, idx) => {
    const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
    let obj = { id: idx };
    headers.forEach((h, i) => obj[h] = vals[i]);
    return obj;
  });
}

function populateDropdowns() {
  const brands = [...new Set(allTeas.map(t => t[CONFIG.BRAND_COL]))].filter(Boolean);
  const types = [...new Set(allTeas.map(t => t[CONFIG.TYPE_COL]))].filter(Boolean);
  
  const bSelect = document.getElementById('filter-brand');
  brands.forEach(b => bSelect.innerHTML += `<option value="${b}">${b}</option>`);
  
  const tSelect = document.getElementById('filter-type');
  types.forEach(t => tSelect.innerHTML += `<option value="${t}">${t}</option>`);
}

function renderHome() {
  const now = new Date();
  const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  
  const decaf = allTeas.filter(t => t[CONFIG.CAFFEINE_COL] === '無');
  const near = allTeas.filter(t => {
    const d = parseDate(t[CONFIG.EXPIRY_COL]);
    return d && d <= nextMonth;
  });

  document.getElementById('stat-total').textContent = allTeas.length;
  document.getElementById('stat-decaf').textContent = decaf.length;
  document.getElementById('stat-near').textContent = near.length;

  // 賞味期限チェック（当月のみ）
  const thisMonthExpiry = allTeas.filter(t => {
    const d = parseDate(t[CONFIG.EXPIRY_COL]);
    return d && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });

  const expiryDiv = document.getElementById('expiry-list');
  if (thisMonthExpiry.length > 0) {
    expiryDiv.innerHTML = thisMonthExpiry.map(t => `<div style="font-size:13px; margin-bottom:5px;">⚠️ ${t[CONFIG.NAME_COL]} (${t[CONFIG.EXPIRY_COL]})</div>`).join('');
    document.getElementById('section-expiry').style.display = 'block';
  } else {
    document.getElementById('section-expiry').style.display = 'none';
  }

  // おすすめ（開封済からランダム）
  const opened = allTeas.filter(t => t[CONFIG.OPEN_COL] && t[CONFIG.OPEN_COL] !== '-' && t[CONFIG.OPEN_COL] !== '');
  const recBox = document.getElementById('recommend-box');
  if (opened.length > 0) {
    const randomTea = opened[Math.floor(Math.random() * opened.length)];
    recBox.innerHTML = `<strong>${randomTea[CONFIG.NAME_COL]}</strong><br><span style="font-size:12px;">${randomTea[CONFIG.DESC_COL] || 'おすすめの紅茶です。'}</span>`;
  } else {
    recBox.innerHTML = '開封済みの紅茶がありません。新しく開けてみませんか？';
  }
}

function parseDate(str) {
  if (!str || str === '-') return null;
  const p = str.split('/');
  if (p.length === 2) return new Date(2000 + parseInt(p[0]), parseInt(p[1]) - 1, 1);
  if (p.length === 3) return new Date(p[0].length === 2 ? 2000 + parseInt(p[0]) : p[0], p[1]-1, p[2]);
  return null;
}

function renderTeaList(teas) {
  const container = document.getElementById('tea-list');
  container.innerHTML = teas.map(t => `
    <div class="tea-card">
      <input type="checkbox" class="select-checkbox" ${selectedTeaIds.has(t.id) ? 'checked' : ''} onchange="toggleSelect(${t.id})">
      <div class="card-content" onclick="showDetail(${t.id})">
        <div class="card-name">${t[CONFIG.NAME_COL]}</div>
        <div style="font-size:11px; color:#999">${t[CONFIG.BRAND_COL]} | ${t[CONFIG.TYPE_COL]}</div>
      </div>
    </div>
  `).join('');
}

function toggleSelect(id) {
  if (selectedTeaIds.has(id)) selectedTeaIds.delete(id);
  else selectedTeaIds.add(id);
  renderMenu();
}

function renderMenu() {
  const container = document.getElementById('menu-items-container');
  const selected = allTeas.filter(t => selectedTeaIds.has(t.id));
  
  if (selected.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#ccc; margin-top:20px;">一覧で紅茶を選択してください</p>';
    return;
  }
  
  container.innerHTML = selected.map(t => `
    <div class="menu-item">
      <div class="menu-item-name">${t[CONFIG.NAME_COL]}</div>
      <div class="menu-item-desc">${t[CONFIG.DESC_COL] || ''}</div>
    </div>
  `).join('');
}

function filterTeas() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const b = document.getElementById('filter-brand').value;
  const t = document.getElementById('filter-type').value;
  
  const filtered = allTeas.filter(tea => {
    const matchQ = tea[CONFIG.NAME_COL].toLowerCase().includes(q) || (tea[CONFIG.DESC_COL] || '').toLowerCase().includes(q);
    const matchB = !b || tea[CONFIG.BRAND_COL] === b;
    const matchT = !t || tea[CONFIG.TYPE_COL] === t;
    return matchQ && matchB && matchT;
  });
  renderTeaList(filtered);
}

function jumpToList(type) {
  showPage('list', document.querySelectorAll('.nav-tab')[1]);
  if (type === 'all') {
    document.getElementById('filter-brand').value = "";
    document.getElementById('filter-type').value = "";
  } else if (type === 'decaf') {
    const decafTeas = allTeas.filter(t => t[CONFIG.CAFFEINE_COL] === '無');
    renderTeaList(decafTeas);
    return;
  } else if (type === 'expiry') {
    const now = new Date();
    const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
    const nearTeas = allTeas.filter(t => {
      const d = parseDate(t[CONFIG.EXPIRY_COL]);
      return d && d <= nextMonth;
    });
    renderTeaList(nearTeas);
    return;
  }
  filterTeas();
}

function showDetail(id) {
  const t = allTeas.find(x => x.id === id);
  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <h2 style="font-family:var(--font-display); margin-bottom:10px;">${t[CONFIG.NAME_COL]}</h2>
    <p style="color:var(--tea-gray); margin-bottom:20px;">${t[CONFIG.DESC_COL] || ''}</p>
    <table style="width:100%; font-size:13px; border-collapse:collapse;">
      ${Object.entries(t).filter(([k])=>k!=='id').map(([k, v]) => `
        <tr style="border-bottom:1px solid #eee;">
          <td style="padding:10px 0; color:#999;">${k}</td>
          <td style="padding:10px 0; text-align:right;">${v || '-'}</td>
        </tr>
      `).join('')}
    </table>
  `;
  showPageDirect('detail');
}

function showPage(name, btn) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  showPageDirect(name);
}

function showPageDirect(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
