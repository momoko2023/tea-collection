<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Tea Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: #faf7f4; color: #2c2420; min-height: 100vh; -webkit-font-smoothing: antialiased; }
:root {
  --tea-deep: #7a3f3f; --tea-rose: #dea8a8; --tea-blush: #f5e8e8;
  --tea-cream: #faf7f4; --tea-mist: #e8e4df; --tea-ink: #2c2420; --tea-gray: #8a7f7a;
  --shadow-sm: 0 1px 3px rgba(122,63,63,0.08); --shadow-md: 0 4px 16px rgba(122,63,63,0.12); --shadow-lg: 0 8px 32px rgba(122,63,63,0.16);
  --radius-md: 14px; --radius-lg: 20px; --font-display: 'Cormorant Garamond', serif; --font-body: 'DM Sans', sans-serif; --max-width: 480px;
}

/* PASSWORD */
#pw-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; background:linear-gradient(160deg,#fdf8f3 0%,#f5e8e8 40%,#ede8f5 100%); position:relative; overflow:hidden; }
#pw-screen::before { content:''; position:absolute; top:-100px; right:-100px; width:400px; height:400px; background:radial-gradient(circle,rgba(222,168,168,0.25) 0%,transparent 70%); pointer-events:none; }
.pw-container { text-align:center; position:relative; z-index:1; animation:fadeUp 0.6s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
.pw-teacup { font-size:56px; margin-bottom:1.5rem; display:block; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);} }
.pw-title { font-family:var(--font-display); font-size:42px; font-weight:300; font-style:italic; color:var(--tea-deep); line-height:1.1; margin-bottom:6px; }
.pw-subtitle { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--tea-gray); margin-bottom:2.5rem; }
.pw-form { width:100%; max-width:280px; margin:0 auto; }
.pw-form input { width:100%; padding:12px 20px; border:1.5px solid var(--tea-rose); border-radius:30px; font-family:var(--font-body); font-size:15px; background:rgba(255,255,255,0.75); color:var(--tea-ink); text-align:center; letter-spacing:0.15em; outline:none; transition:border-color 0.2s,box-shadow 0.2s; margin-bottom:12px; }
.pw-form input:focus { border-color:var(--tea-deep); box-shadow:0 0 0 3px rgba(122,63,63,0.1); }
.pw-btn { width:100%; padding:12px; background:var(--tea-deep); color:white; border:none; border-radius:30px; font-family:var(--font-body); font-size:13px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; box-shadow:var(--shadow-md); }
.pw-btn:hover { background:#6a3535; transform:translateY(-1px); }
.pw-error { color:#b04040; font-size:12px; margin-top:10px; min-height:18px; text-align:center; }
@keyframes shake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);} }

/* MAIN */
#main-app { display:none; max-width:var(--max-width); margin:0 auto; }

/* NAV */
.nav { position:sticky; top:0; z-index:100; background:rgba(250,247,244,0.94); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid rgba(222,168,168,0.3); padding:0 12px; display:flex; align-items:center; justify-content:space-between; height:52px; }
.nav-logo { font-family:var(--font-display); font-size:20px; font-weight:400; font-style:italic; color:var(--tea-deep); }
.nav-logo span { color:var(--tea-rose); }
.nav-tabs { display:flex; gap:2px; background:var(--tea-mist); border-radius:20px; padding:3px; }
.nav-tab { padding:4px 10px; border-radius:16px; font-size:11px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--tea-gray); font-family:var(--font-body); transition:all 0.2s; white-space:nowrap; }
.nav-tab.active { background:white; color:var(--tea-deep); box-shadow:var(--shadow-sm); }

/* PAGES */
.page { display:none; animation:pageIn 0.25s ease both; }
.page.active { display:block; }
@keyframes pageIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }

/* HOME */
.home-hero { background:linear-gradient(160deg,#fdf8f3 0%,#f8eaec 55%,#f0e8f5 100%); padding:1.8rem 1.5rem 1.2rem; text-align:center; position:relative; overflow:hidden; }
.home-hero::before { content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; background:radial-gradient(circle,rgba(222,168,168,0.3) 0%,transparent 70%); pointer-events:none; }
.home-emoji { font-size:44px; margin-bottom:8px; display:block; }
.home-title { font-family:var(--font-display); font-size:34px; font-weight:300; font-style:italic; color:var(--tea-deep); line-height:1.15; margin-bottom:4px; }
.home-date { font-size:11px; color:var(--tea-gray); letter-spacing:0.06em; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px; }
.stat-card { background:white; border-radius:var(--radius-md); padding:12px 6px; text-align:center; box-shadow:var(--shadow-sm); border:1px solid rgba(222,168,168,0.2); cursor:pointer; transition:all 0.2s; }
.stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--tea-rose); }
.stat-num { font-family:var(--font-display); font-size:30px; font-weight:300; color:var(--tea-deep); line-height:1; }
.stat-label { font-size:9px; color:var(--tea-gray); letter-spacing:0.07em; text-transform:uppercase; margin-top:3px; line-height:1.3; }
.home-section { padding:0 12px 12px; }
.section-title { font-family:var(--font-display); font-size:18px; font-weight:400; font-style:italic; color:var(--tea-deep); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(222,168,168,0.5),transparent); }
.brand-grid { display:flex; flex-wrap:wrap; gap:7px; }
.brand-card { padding:5px 13px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; background:white; color:var(--tea-deep); border:1.5px solid rgba(222,168,168,0.4); box-shadow:var(--shadow-sm); transition:all 0.2s; }
.brand-card:hover { background:var(--tea-blush); border-color:var(--tea-rose); transform:translateY(-1px); }
.expiry-list { display:flex; flex-direction:column; gap:7px; }
.expiry-item { background:white; border-radius:var(--radius-md); padding:10px 13px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow-sm); border:1px solid rgba(222,168,168,0.15); cursor:pointer; transition:all 0.2s; }
.expiry-item:hover { transform:translateX(3px); }
.expiry-item.expired { border-left:3px solid #b04040; }
.expiry-item.soon { border-left:3px solid #e07070; }
.expiry-name { font-size:13px; font-weight:500; }
.expiry-date { font-size:11px; color:var(--tea-gray); margin-top:1px; }
.expiry-badge { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:500; white-space:nowrap; }
.expiry-badge.expired { background:#f0d8d8; color:#b04040; }
.expiry-badge.soon { background:#fee8e8; color:#c05050; }
.rec-card { background:linear-gradient(135deg,#fdf5f0,#f8eaec); border-radius:var(--radius-lg); padding:14px 16px; border:1px solid rgba(222,168,168,0.3); box-shadow:var(--shadow-sm); cursor:pointer; transition:all 0.2s; }
.rec-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.rec-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--tea-rose); margin-bottom:6px; }
.rec-name { font-family:var(--font-display); font-size:22px; font-style:italic; color:var(--tea-deep); font-weight:400; line-height:1.2; margin-bottom:3px; }
.rec-brand { font-size:11px; color:var(--tea-gray); letter-spacing:0.08em; }
.rec-desc { font-size:12px; color:var(--tea-gray); margin-top:8px; line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

/* LIST HEADER */
.list-header { background:white; padding:10px 12px; border-bottom:1px solid rgba(222,168,168,0.2); position:sticky; top:52px; z-index:50; }
.search-wrap { display:flex; align-items:center; gap:8px; background:var(--tea-cream); border:1.5px solid rgba(222,168,168,0.35); border-radius:24px; padding:7px 14px; margin-bottom:9px; transition:border-color 0.2s; }
.search-wrap:focus-within { border-color:var(--tea-deep); }
.search-wrap input { border:none; background:transparent; font-size:13px; color:var(--tea-ink); width:100%; outline:none; font-family:var(--font-body); }
.search-wrap input::placeholder { color:var(--tea-gray); }

/* FILTER ROWS */
.filter-row1 { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; }
.filter-row1::-webkit-scrollbar { display:none; }
.filter-select-wrap { position:relative; flex-shrink:0; }
.filter-select { appearance:none; -webkit-appearance:none; padding:5px 24px 5px 11px; border-radius:14px; font-size:11px; font-weight:500; cursor:pointer; background:var(--tea-cream); color:var(--tea-gray); border:1.5px solid rgba(222,168,168,0.3); font-family:var(--font-body); transition:all 0.15s; outline:none; }
.filter-select.active { background:var(--tea-deep); color:white; border-color:var(--tea-deep); }
.filter-select-wrap::after { content:'▾'; position:absolute; right:8px; top:50%; transform:translateY(-52%); font-size:9px; pointer-events:none; color:var(--tea-gray); }
.filter-select-wrap.active-wrap::after { color:white; }
.filter-select option { background:white; color:var(--tea-ink); }

/* FLAVOR CHECKBOXES */
.flavor-section { margin-top:7px; }
.flavor-toggle { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--tea-gray); cursor:pointer; user-select:none; padding:2px 0; }
.flavor-toggle-icon { font-size:10px; transition:transform 0.2s; }
.flavor-toggle-icon.open { transform:rotate(90deg); }
.flavor-chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; padding-bottom:2px; }
.flavor-chip { padding:4px 11px; border-radius:12px; font-size:11px; font-weight:500; cursor:pointer; background:var(--tea-cream); color:var(--tea-gray); border:1.5px solid rgba(222,168,168,0.3); font-family:var(--font-body); transition:all 0.15s; user-select:none; }
.flavor-chip.active { background:var(--tea-deep); color:white; border-color:var(--tea-deep); }
.flavor-chip:hover:not(.active) { border-color:var(--tea-rose); color:var(--tea-deep); }
.flavor-hint { font-size:10px; color:var(--tea-rose); margin-top:4px; }

/* TEA CARDS */
.tea-list { padding:10px; display:flex; flex-direction:column; gap:10px; }
.tea-card { background:white; border-radius:var(--radius-lg); padding:13px 15px; border:1px solid rgba(222,168,168,0.2); box-shadow:var(--shadow-sm); transition:all 0.2s; position:relative; overflow:hidden; }
.tea-card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:4px; background:var(--card-accent,var(--tea-rose)); border-radius:4px 0 0 4px; }
.tea-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
.card-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.card-name { font-family:var(--font-display); font-size:18px; font-weight:400; font-style:italic; color:var(--tea-ink); flex:1; line-height:1.2; cursor:pointer; }
.card-brand-badge { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--tea-gray); background:var(--tea-mist); padding:3px 8px; border-radius:8px; margin-left:8px; flex-shrink:0; margin-top:3px; }
.card-desc { font-size:12px; color:var(--tea-gray); line-height:1.55; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; cursor:pointer; }
.card-bottom { display:flex; align-items:flex-end; justify-content:space-between; gap:8px; }
.card-tags { display:flex; flex-wrap:wrap; gap:4px; flex:1; }
.tag { font-size:10px; font-weight:500; padding:3px 8px; border-radius:8px; }
.tag-type { background:#ede8f5; color:#5a3a7a; }
.tag-caffeine-none { background:#e8f5e8; color:#2d6a2d; }
.tag-caffeine-normal { background:#fff3e0; color:#7a4a0a; }
.tag-flavor { background:var(--tea-blush); color:var(--tea-deep); }
.tag-soldout { background:#f0d8d8; color:#8a3030; font-size:9px; }
.menu-check { width:26px; height:26px; border-radius:8px; border:1.5px solid var(--tea-rose); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; font-size:13px; }
.menu-check.checked { background:var(--tea-deep); border-color:var(--tea-deep); color:white; }
.menu-check:hover { border-color:var(--tea-deep); }
.empty-state { text-align:center; padding:3rem 1rem; color:var(--tea-gray); }
.empty-state .empty-icon { font-size:40px; margin-bottom:12px; display:block; opacity:0.5; }
.empty-state p { font-size:13px; }

/* DETAIL */
.detail-back { display:flex; align-items:center; gap:6px; padding:12px 16px; font-size:13px; color:var(--tea-deep); cursor:pointer; background:white; border-bottom:1px solid rgba(222,168,168,0.2); font-weight:500; transition:background 0.15s; }
.detail-back:hover { background:var(--tea-blush); }
.detail-hero { background:linear-gradient(160deg,#fdf8f3 0%,#f8eaec 60%,#f0e8f5 100%); padding:1.8rem 1.5rem; text-align:center; position:relative; overflow:hidden; }
.detail-name { font-family:var(--font-display); font-size:32px; font-weight:300; font-style:italic; color:var(--tea-deep); line-height:1.1; margin-bottom:4px; }
.detail-brand-label { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--tea-gray); }
.detail-body { padding:12px; }
.detail-section { background:white; border-radius:var(--radius-md); padding:13px 15px; margin-bottom:10px; border:1px solid rgba(222,168,168,0.15); box-shadow:var(--shadow-sm); }
.detail-section-label { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--tea-rose); font-weight:500; margin-bottom:9px; padding-bottom:6px; border-bottom:1px solid rgba(222,168,168,0.2); }
.detail-desc-text { font-size:13px; line-height:1.75; color:var(--tea-ink); }
.detail-row { display:flex; justify-content:space-between; align-items:flex-start; padding:6px 0; font-size:13px; border-bottom:1px solid rgba(222,168,168,0.12); }
.detail-row:last-child { border-bottom:none; }
.detail-key { color:var(--tea-gray); flex-shrink:0; }
.detail-val { color:var(--tea-ink); font-weight:500; text-align:right; max-width:65%; line-height:1.4; }
.flavor-tags { display:flex; flex-wrap:wrap; gap:6px; }
.flavor-tag-d { padding:4px 11px; border-radius:12px; font-size:11px; font-weight:500; background:var(--tea-blush); color:var(--tea-deep); border:1px solid rgba(222,168,168,0.4); }
.detail-link-btn { display:block; width:100%; padding:13px; background:var(--tea-deep); color:white; border:none; border-radius:30px; font-family:var(--font-body); font-size:13px; font-weight:500; letter-spacing:0.08em; cursor:pointer; text-align:center; margin-top:4px; box-shadow:var(--shadow-md); transition:all 0.2s; }
.detail-link-btn:hover { background:#6a3535; transform:translateY(-1px); }

/* TODAY'S TEA */
.menu-header { background:linear-gradient(160deg,#fdf8f3 0%,#f8eaec 60%,#f0e8f5 100%); padding:1.5rem; text-align:center; position:relative; overflow:hidden; }
.menu-header::before { content:''; position:absolute; top:-40px;right:-40px;width:160px;height:160px; background:radial-gradient(circle,rgba(222,168,168,0.3) 0%,transparent 70%); pointer-events:none; }
.menu-title-en { font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:var(--tea-rose); margin-bottom:6px; }
.menu-title { font-family:var(--font-display); font-size:34px; font-weight:300; font-style:italic; color:var(--tea-deep); line-height:1.1; margin-bottom:4px; }
.menu-date-label { font-size:11px; color:var(--tea-gray); letter-spacing:0.06em; }
.menu-body { padding:12px; }
.menu-hint { text-align:center; font-size:12px; color:var(--tea-gray); margin-bottom:12px; padding:10px 14px; background:white; border-radius:var(--radius-md); border:1px dashed rgba(222,168,168,0.4); line-height:1.6; }
.menu-hint span { color:var(--tea-deep); font-weight:500; cursor:pointer; }
.menu-paper { background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-md); border:1px solid rgba(222,168,168,0.25); overflow:hidden; margin-bottom:12px; }
.menu-paper-top { background:var(--tea-deep); color:white; padding:14px 18px; text-align:center; }
.menu-paper-title { font-family:var(--font-display); font-size:22px; font-style:italic; font-weight:300; letter-spacing:0.04em; }
.menu-paper-subtitle { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; opacity:0.72; margin-top:3px; }
.menu-divider { height:1px; background:linear-gradient(to right,transparent,rgba(222,168,168,0.45),transparent); margin:0 16px; }
.menu-item { padding:14px 18px; border-bottom:1px solid rgba(222,168,168,0.15); position:relative; }
.menu-item:last-child { border-bottom:none; }
.menu-item-num { font-family:var(--font-display); font-size:11px; color:var(--tea-rose); letter-spacing:0.1em; font-style:italic; margin-bottom:3px; }
.menu-item-name { font-family:var(--font-display); font-size:20px; font-style:italic; color:var(--tea-deep); font-weight:400; line-height:1.2; margin-bottom:2px; }
.menu-item-brand { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--tea-gray); margin-bottom:7px; }
.menu-item-desc { font-size:12px; color:var(--tea-gray); line-height:1.65; }
.menu-item-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.menu-item-tag { font-size:10px; padding:2px 8px; border-radius:8px; background:var(--tea-blush); color:var(--tea-deep); }
.menu-remove { position:absolute; top:12px; right:14px; width:22px;height:22px; border-radius:50%; background:var(--tea-blush); border:none; cursor:pointer; font-size:11px; color:var(--tea-deep); display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.menu-remove:hover { background:var(--tea-rose); }
.menu-empty { text-align:center; padding:2.5rem 1rem; color:var(--tea-gray); }
.menu-empty .empty-icon { font-size:38px; margin-bottom:10px; display:block; opacity:0.45; }
.menu-empty p { font-size:13px; line-height:1.7; }

.loading { text-align:center; padding:3rem 1rem; color:var(--tea-gray); }
.loading-spin { display:inline-block; width:22px;height:22px; border:2px solid var(--tea-rose); border-top-color:var(--tea-deep); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:9px; }
@keyframes spin { to{transform:rotate(360deg);} }
.bottom-space { height:24px; }
@media(min-width:481px){ #main-app { min-height:100vh; box-shadow:0 0 40px rgba(122,63,63,0.08); } }
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="pw-screen">
  <div class="pw-container">
    <span class="pw-teacup">🍵</span>
    <h1 class="pw-title">My Tea<br>Collection</h1>
    <p class="pw-subtitle">Private Tea Library</p>
    <div class="pw-form">
      <input type="password" id="pw-input" placeholder="パスワードを入力してください" autocomplete="off" />
      <button class="pw-btn" onclick="checkPw()">Enter ✦</button>
      <p class="pw-error" id="pw-error"></p>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main-app">
  <nav class="nav">
    <div class="nav-logo">Tea <span>✦</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('home',this)">Home</button>
      <button class="nav-tab"        onclick="showPage('list',this)">一覧</button>
      <button class="nav-tab"        onclick="showPage('menu',this)">Today's Tea</button>
    </div>
  </nav>

  <!-- HOME -->
  <div id="page-home" class="page active">
    <div class="home-hero">
      <span class="home-emoji">🫖</span>
      <h1 class="home-title">My Tea<br>Collection</h1>
      <p class="home-date" id="home-date"></p>
    </div>
    <div class="stats-grid">
      <div class="stat-card" onclick="goFilteredList('all')">
        <div class="stat-num" id="stat-total">…</div>
        <div class="stat-label">合計</div>
      </div>
      <div class="stat-card" onclick="goFilteredList('nocaffeine')">
        <div class="stat-num" id="stat-nocaff">…</div>
        <div class="stat-label">ノンカフェイン</div>
      </div>
      <div class="stat-card" onclick="goFilteredList('expiring')">
        <div class="stat-num" id="stat-expiring">…</div>
        <div class="stat-label">期限 翌月まで</div>
      </div>
    </div>
    <div class="home-section">
      <div class="section-title">ブランド</div>
      <div class="brand-grid" id="brand-grid"><div class="loading"><div class="loading-spin"></div></div></div>
    </div>
    <div class="home-section" id="expiry-section">
      <div class="section-title">賞味期限チェック</div>
      <div id="expiry-list"></div>
    </div>
    <div class="home-section" id="rec-section" style="display:none">
      <div class="section-title">Today's Pick ✦</div>
      <div id="rec-card"></div>
    </div>
    <div class="bottom-space"></div>
  </div>

  <!-- LIST -->
  <div id="page-list" class="page">
    <div class="list-header">
      <div class="search-wrap">
        <span style="color:var(--tea-rose);font-size:14px;flex-shrink:0">🔍</span>
        <input type="text" id="search-input" placeholder="名前・ブランド・香りで検索…" oninput="filterTeas()" />
      </div>
      <!-- プルダウンフィルター行 -->
      <div class="filter-row1" id="filter-row1"></div>
      <!-- フレーバー複数選択 -->
      <div class="flavor-section" id="flavor-section" style="display:none">
        <div class="flavor-toggle" onclick="toggleFlavorPanel()">
          <span class="flavor-toggle-icon" id="flavor-toggle-icon">▶</span>
          <span id="flavor-toggle-label">フレーバーで絞り込む</span>
        </div>
        <div id="flavor-panel" style="display:none">
          <div class="flavor-chips" id="flavor-chips"></div>
          <div class="flavor-hint" id="flavor-hint"></div>
        </div>
      </div>
    </div>
    <div class="tea-list" id="tea-list"><div class="loading"><div class="loading-spin"></div></div></div>
    <div class="bottom-space"></div>
  </div>

  <!-- DETAIL -->
  <div id="page-detail" class="page">
    <div class="detail-back" onclick="backFromDetail()">← 戻る</div>
    <div class="detail-hero">
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-brand-label" id="detail-brand"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="bottom-space"></div>
  </div>

  <!-- TODAY'S TEA -->
  <div id="page-menu" class="page">
    <div class="menu-header">
      <div class="menu-title-en">Today's Tea Selection</div>
      <h2 class="menu-title">Tea Menu</h2>
      <div class="menu-date-label" id="menu-date"></div>
    </div>
    <div class="menu-body">
      <div class="menu-hint">
        「一覧」ページの <strong>＋</strong> でお茶を追加できます<br>
        <span onclick="showPage('list')">→ 一覧を見る</span>
      </div>
      <div id="menu-content"></div>
    </div>
    <div class="bottom-space"></div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const CONFIG = {
  PASSWORD:      'Lkun',
  SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1qMVoiJ7paL9DLLmfiMalRJaqK3mcNfkVujDAojlehIaY1bogsofhBgmhxAwZ1LalxmRcyJ8oK6Wk/pub?gid=0&single=true&output=csv',

  // プルダウンフィルター対象カラム（スプレッドシートに列が存在する場合のみフィルター表示される）
  FILTERABLE_COLUMNS: ['ブランド', 'カフェイン量', '茶種', '賞味期限', '開封日', '完売'],

  // フレーバーカラム（列が存在しない場合は自動的に無効化）
  FLAVOR_COLUMN:  'フレーバー',
  SOLDOUT_COLUMN: '完売',
  SOLDOUT_VALUE:  '在庫なし',

  BRAND_COLORS: {
    'MARIAGE FRÈRES':'#8b6355', 'Art of Tea':'#6a8b55',
    'TEAPOND':'#6b558b', 'LUPICIA':'#8b7a55'
  },
  EXPIRY_COLUMN:  '賞味期限',
  NAME_COLUMN:    '商品名',
  URL_COLUMN:     '商品URL',
  DESC_COLUMN:    '説明',
  OPENED_COLUMN:  '開封日',
};

// ============================================================
//  STATE
// ============================================================
let allTeas       = [];
let menuTeas      = new Set();
let activeFilters = {};        // { col: val } — プルダウン用
let activeFlavors = new Set(); // フレーバー複数選択用
let flavorPanelOpen = false;
let detailFrom    = 'list';

// ============================================================
//  AUTH
// ============================================================
function checkPw() {
  if (document.getElementById('pw-input').value === CONFIG.PASSWORD) {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('main-app').style.display  = 'block';
    initApp();
  } else {
    const e = document.getElementById('pw-error');
    e.textContent = 'パスワードが違います';
    e.style.animation = 'none';
    setTimeout(() => e.style.animation = 'shake 0.3s ease', 10);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') checkPw(); });

// ============================================================
//  INIT
// ============================================================
function initApp() {
  const now = new Date();
  const ds  = now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('home-date').textContent = ds;
  document.getElementById('menu-date').textContent = ds;
  fetchData();
}

// ============================================================
//  FETCH & PARSE
// ============================================================
async function fetchData() {
  try {
    const res = await fetch(CONFIG.SHEET_CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error();
    allTeas = parseCSV(await res.text());
    renderAll();
  } catch { showError(); }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line), obj = {};
    headers.forEach((h,i) => { obj[h.trim()] = (vals[i]||'').trim(); });
    return obj;
  }).filter(t => t[CONFIG.NAME_COLUMN] && t[CONFIG.NAME_COLUMN].trim());
}

function parseCSVLine(line) {
  const r=[]; let cur='', inQ=false;
  for (const c of line) {
    if (c==='"') inQ=!inQ;
    else if (c===',' && !inQ) { r.push(cur); cur=''; }
    else cur+=c;
  }
  r.push(cur); return r;
}

function showError() {
  const msg='<div class="empty-state"><span class="empty-icon">⚠️</span><p>データを読み込めませんでした。<br>スプレッドシートの公開設定を確認してください。</p></div>';
  ['brand-grid','tea-list'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=msg; });
}

// フレーバーをカンマ区切りで配列に分解するヘルパー
// 「フレーバー」列がなければ、○/× 形式の個別列（キャラメル等）からフォールバック
const LEGACY_AROMA_COLS = ['キャラメル','チョコレート','バニラ','バラ','花(バラ以外)','果物(ベリー)','果物(柑橘)','果物(その他)'];

function parseFlavors(str, teaObj) {
  // 「フレーバー」列がある場合はそちらを使う
  if (str && str.trim()) {
    return str.split(/[,、，]/).map(s=>s.trim()).filter(Boolean);
  }
  // フォールバック：○/× 列から読み取る
  if (teaObj) {
    return LEGACY_AROMA_COLS.filter(col => (teaObj[col]||'').trim() === '○');
  }
  return [];
}

function renderAll() { renderHome(); renderFilterDropdowns(); renderFlavorChips(); renderTeaList(getFiltered()); renderMenu(); }

// ============================================================
//  HOME
// ============================================================
function renderHome() {
  const now     = new Date();
  const thisEnd = new Date(now.getFullYear(), now.getMonth()+1, 0); // 今月末
  const nextEnd = new Date(now.getFullYear(), now.getMonth()+2, 0); // 翌月末

  // 完売品を除いた在庫のみで統計
  const inStock  = allTeas.filter(t => !isSoldOut(t));
  const noCaff   = inStock.filter(t => t['カフェイン量']==='無');
  const expiring = inStock.filter(t => { const d=parseExpiry(t[CONFIG.EXPIRY_COLUMN]); return d<=nextEnd && d>new Date('2000-01-01'); });

  document.getElementById('stat-total').textContent    = inStock.length;
  document.getElementById('stat-nocaff').textContent   = noCaff.length;
  document.getElementById('stat-expiring').textContent = expiring.length;

  // ブランド（在庫あり）
  const brands = [...new Set(inStock.map(t=>t['ブランド']).filter(Boolean))];
  document.getElementById('brand-grid').innerHTML = brands.map(b =>
    `<div class="brand-card" onclick="filterByBrand('${esc(b)}')">${b}</div>`
  ).join('');

  // 賞味期限チェック：期限切れ（過去含む）＋今月末まで（在庫あり）
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const expirySoon = inStock
    .filter(t => { const d=parseExpiry(t[CONFIG.EXPIRY_COLUMN]); return d<=thisEnd && d>new Date('2000-01-01'); })
    .sort((a,b) => parseExpiry(a[CONFIG.EXPIRY_COLUMN]) - parseExpiry(b[CONFIG.EXPIRY_COLUMN]));

  if (expirySoon.length > 0) {
    document.getElementById('expiry-section').style.display='';
    document.getElementById('rec-section').style.display='none';
    document.getElementById('expiry-list').innerHTML = expirySoon.map(t => {
      const idx = allTeas.indexOf(t);
      const d   = parseExpiry(t[CONFIG.EXPIRY_COLUMN]);
      const isExpired = d < today;
      return `<div class="expiry-item ${isExpired?'expired':'soon'}" onclick="showDetail(${idx},'home')">
        <div><div class="expiry-name">${t[CONFIG.NAME_COLUMN]}</div>
        <div class="expiry-date">賞味期限: ${t[CONFIG.EXPIRY_COLUMN]}</div></div>
        <span class="expiry-badge ${isExpired?'expired':'soon'}">${isExpired?'期限切れ':'今月'}</span>
      </div>`;
    }).join('');
  } else {
    document.getElementById('expiry-section').style.display='none';
    // 開封済みからランダムおすすめ（在庫あり）
    const opened = inStock.filter(t => t[CONFIG.OPENED_COLUMN] && t[CONFIG.OPENED_COLUMN].trim() && t[CONFIG.OPENED_COLUMN].trim()!=='-');
    if (opened.length > 0) {
      document.getElementById('rec-section').style.display='';
      const pick = opened[Math.floor(Math.random()*opened.length)];
      const idx  = allTeas.indexOf(pick);
      document.getElementById('rec-card').innerHTML =
        `<div class="rec-card" onclick="showDetail(${idx},'home')">
          <div class="rec-label">✦ Today's Recommendation</div>
          <div class="rec-name">${pick[CONFIG.NAME_COLUMN]}</div>
          <div class="rec-brand">${pick['ブランド']||''}</div>
          <div class="rec-desc">${pick[CONFIG.DESC_COLUMN]||''}</div>
        </div>`;
    } else {
      document.getElementById('rec-section').style.display='none';
    }
  }
}

function isSoldOut(t) {
  // 列が存在しない場合（undefined）は在庫ありとして扱う
  const val = t[CONFIG.SOLDOUT_COLUMN];
  if (val === undefined) return false;
  return val.trim() === CONFIG.SOLDOUT_VALUE;
}

function parseExpiry(str) {
  if (!str || str==='-' || !str.trim()) return new Date('9999-12-31');
  const p = str.trim().split('/');
  if (p.length >= 2) {
    const y = parseInt(p[0])<100 ? 2000+parseInt(p[0]) : parseInt(p[0]);
    return new Date(y, parseInt(p[1])-1, p[2]?parseInt(p[2]):28);
  }
  return new Date('9999-12-31');
}

// ============================================================
//  STAT → FILTERED LIST
// ============================================================
function goFilteredList(mode) {
  activeFilters = {};
  activeFlavors.clear();
  if (mode==='nocaffeine') activeFilters={'カフェイン量':'無'};
  else if (mode==='expiring') activeFilters={__expiring:true};
  else activeFilters={__all:true}; // 「合計」→ 完売品も含む全件
  showPage('list');
  renderFilterDropdowns();
  renderFlavorChips();
  filterTeas();
}

function filterByBrand(brand) {
  activeFilters={'ブランド':brand};
  activeFlavors.clear();
  showPage('list');
  renderFilterDropdowns();
  renderFlavorChips();
  filterTeas();
}

// ============================================================
//  DROPDOWN FILTERS
// ============================================================
function renderFilterDropdowns() {
  const container = document.getElementById('filter-row1');
  const isAllMode = !!activeFilters.__all;
  const noFilter  = Object.keys(activeFilters).length===0 || isAllMode;

  let html = `<div class="filter-select-wrap${noFilter?' active-wrap':''}">
    <select class="filter-select${noFilter?' active':''}" onchange="onAllSelect(this)">
      <option value="">すべて</option>
      <option value="__all"${isAllMode?' selected':''}>完売含む全件</option>
    </select></div>`;

  CONFIG.FILTERABLE_COLUMNS.forEach(col => {
    const vals = [...new Set(allTeas.map(t=>t[col]).filter(Boolean))].sort();
    if (!vals.length) return;
    const cur      = activeFilters[col]||'';
    const isActive = !!cur;
    html += `<div class="filter-select-wrap${isActive?' active-wrap':''}">
      <select class="filter-select${isActive?' active':''}" onchange="onColSelect('${col}',this)">
        <option value="">${col}</option>
        ${vals.map(v=>`<option value="${esc(v)}"${cur===v?' selected':''}>${v}</option>`).join('')}
      </select></div>`;
  });

  container.innerHTML = html;
}

function onAllSelect(sel) {
  const val = sel.value;
  activeFlavors.clear();
  if (val==='__all') { activeFilters={__all:true}; }
  else { activeFilters={}; }
  renderFilterDropdowns(); renderFlavorChips(); filterTeas();
}

function onColSelect(col, sel) {
  const val = sel.value;
  activeFlavors.clear();
  activeFilters = val ? {[col]:val} : {};
  renderFilterDropdowns(); renderFlavorChips(); filterTeas();
}

// ============================================================
//  FLAVOR MULTI-SELECT
// ============================================================
function renderFlavorChips() {
  // 全フレーバー値を収集（「在庫なし」以外も含め全件から取得）
  const allFlavors = [...new Set(
    allTeas.flatMap(t => parseFlavors(t[CONFIG.FLAVOR_COLUMN], t))
  )].sort();

  const section = document.getElementById('flavor-section');
  if (!allFlavors.length) { section.style.display='none'; return; }
  section.style.display='';

  // アクティブなフレーバー数をラベルに反映
  const label = document.getElementById('flavor-toggle-label');
  label.textContent = activeFlavors.size > 0
    ? `フレーバー: ${[...activeFlavors].join(' ＋ ')}`
    : 'フレーバーで絞り込む';

  const chipsEl = document.getElementById('flavor-chips');
  chipsEl.innerHTML = allFlavors.map(f =>
    `<div class="flavor-chip${activeFlavors.has(f)?' active':''}" onclick="toggleFlavor('${esc(f)}')">${f}</div>`
  ).join('');

  // ヒント
  const hint = document.getElementById('flavor-hint');
  hint.textContent = activeFlavors.size > 1 ? `選択中のフレーバーをすべて含む紅茶を表示` : activeFlavors.size===1 ? '複数選択でAND絞り込みになります' : '';
}

function toggleFlavorPanel() {
  flavorPanelOpen = !flavorPanelOpen;
  document.getElementById('flavor-panel').style.display = flavorPanelOpen ? '' : 'none';
  document.getElementById('flavor-toggle-icon').classList.toggle('open', flavorPanelOpen);
}

function toggleFlavor(flavor) {
  activeFlavors.has(flavor) ? activeFlavors.delete(flavor) : activeFlavors.add(flavor);
  // フレーバーフィルター起動中はプルダウンをリセット
  if (activeFlavors.size > 0) activeFilters = {};
  renderFilterDropdowns();
  renderFlavorChips();
  filterTeas();
}

// ============================================================
//  FILTER & RENDER LIST
// ============================================================
function getFiltered() {
  const q       = (document.getElementById('search-input')?.value||'').toLowerCase();
  const now     = new Date();
  const nextEnd = new Date(now.getFullYear(), now.getMonth()+2, 0);
  const isAll   = !!activeFilters.__all; // 完売含む全件モード

  return allTeas.filter(t => {
    // 完売品は「すべて（完売含む）」モード以外では非表示
    if (isSoldOut(t) && !isAll) return false;

    // テキスト検索
    const matchQ = !q ||
      (t[CONFIG.NAME_COLUMN]||'').toLowerCase().includes(q) ||
      (t['ブランド']||'').toLowerCase().includes(q) ||
      (t['香り']||'').toLowerCase().includes(q) ||
      (t[CONFIG.DESC_COLUMN]||'').toLowerCase().includes(q) ||
      (t[CONFIG.FLAVOR_COLUMN]||'').toLowerCase().includes(q);

    // フレーバーAND絞り込み
    if (activeFlavors.size > 0) {
      const tFlavors = new Set(parseFlavors(t[CONFIG.FLAVOR_COLUMN], t));
      for (const f of activeFlavors) { if (!tFlavors.has(f)) return false; }
    }

    // プルダウンフィルター
    let matchF = true;
    if (activeFilters.__expiring) {
      const d = parseExpiry(t[CONFIG.EXPIRY_COLUMN]);
      matchF = d >= new Date('2000-01-01') && d <= nextEnd;
    } else {
      for (const [col,val] of Object.entries(activeFilters)) {
        if (col.startsWith('__')) continue;
        if (!(t[col]||'').includes(val)) { matchF=false; break; }
      }
    }
    return matchQ && matchF;
  });
}

function filterTeas() { renderTeaList(getFiltered()); }

function renderTeaList(teas) {
  const container = document.getElementById('tea-list');
  if (!teas.length) {
    container.innerHTML='<div class="empty-state"><span class="empty-icon">🍵</span><p>該当する紅茶が見つかりませんでした</p></div>';
    return;
  }
  container.innerHTML = teas.map(t => {
    const idx     = allTeas.indexOf(t);
    const color   = CONFIG.BRAND_COLORS[t['ブランド']]||'#c4856a';
    const flavors = parseFlavors(t[CONFIG.FLAVOR_COLUMN], t);
    const cafCls  = t['カフェイン量']==='無' ? 'tag-caffeine-none' : 'tag-caffeine-normal';
    const inMenu  = menuTeas.has(idx);
    const soldOut = isSoldOut(t);
    return `<div class="tea-card" style="--card-accent:${soldOut?'#c4a4a4':color}">
      <div class="card-row">
        <div class="card-name" onclick="showDetail(${idx},'list')">${t[CONFIG.NAME_COLUMN]}</div>
        <div class="card-brand-badge">${(t['ブランド']||'').split(/[\s　]/)[0]}</div>
      </div>
      <div class="card-desc" onclick="showDetail(${idx},'list')">${t[CONFIG.DESC_COLUMN]||''}</div>
      <div class="card-bottom">
        <div class="card-tags">
          <span class="tag tag-type">${t['茶種']||''}</span>
          <span class="tag ${cafCls}">カフェイン ${t['カフェイン量']||''}</span>
          ${flavors.map(f=>`<span class="tag tag-flavor">${f}</span>`).join('')}
          ${soldOut?`<span class="tag tag-soldout">在庫なし</span>`:''}
        </div>
        ${!soldOut?`<div class="menu-check${inMenu?' checked':''}" onclick="toggleMenu(${idx})" title="Today's Teaに追加">${inMenu?'✓':'＋'}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ============================================================
//  MENU TOGGLE
// ============================================================
function toggleMenu(idx) {
  menuTeas.has(idx) ? menuTeas.delete(idx) : menuTeas.add(idx);
  filterTeas(); renderMenu();
}
function removeFromMenu(idx) { menuTeas.delete(idx); renderMenu(); filterTeas(); }

// ============================================================
//  TODAY'S TEA PAGE
// ============================================================
function renderMenu() {
  const container = document.getElementById('menu-content');
  if (menuTeas.size===0) {
    container.innerHTML=`<div class="menu-empty"><span class="empty-icon">🫖</span><p>「一覧」ページの <strong>＋</strong> を押して<br>Today's Tea に追加してください</p></div>`;
    return;
  }
  const now   = new Date();
  const items = [...menuTeas].map((idx,i) => {
    const t       = allTeas[idx];
    const flavors = parseFlavors(t[CONFIG.FLAVOR_COLUMN], t);
    return `<div class="menu-item">
      <button class="menu-remove" onclick="removeFromMenu(${idx})">✕</button>
      <div class="menu-item-num">— No.${String(i+1).padStart(2,'0')} —</div>
      <div class="menu-item-name">${t[CONFIG.NAME_COLUMN]}</div>
      <div class="menu-item-brand">${t['ブランド']||''}</div>
      <div class="menu-item-desc">${t[CONFIG.DESC_COLUMN]||''}</div>
      ${flavors.length?`<div class="menu-item-tags">${flavors.map(f=>`<span class="menu-item-tag">${f}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('<div class="menu-divider"></div>');

  container.innerHTML=`<div class="menu-paper">
    <div class="menu-paper-top">
      <div class="menu-paper-title">Today's Tea Selection</div>
      <div class="menu-paper-subtitle">${now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
    </div>${items}</div>`;
}

// ============================================================
//  DETAIL
// ============================================================
function showDetail(idx, from) {
  detailFrom = from||'list';
  const t    = allTeas[idx];
  document.getElementById('detail-name').textContent  = t[CONFIG.NAME_COLUMN]||'';
  document.getElementById('detail-brand').textContent = t['ブランド']||'';

  const skip   = new Set([CONFIG.NAME_COLUMN, CONFIG.URL_COLUMN, CONFIG.DESC_COLUMN, 'ブランド', CONFIG.FLAVOR_COLUMN]);
  const keys   = Object.keys(t).filter(k => !skip.has(k) && k.trim() && t[k] && t[k].trim() && t[k].trim()!=='​');
  const flavors = parseFlavors(t[CONFIG.FLAVOR_COLUMN], t);

  let html='';
  if (t[CONFIG.DESC_COLUMN]) html+=`<div class="detail-section"><div class="detail-section-label">紹介</div><p class="detail-desc-text">${t[CONFIG.DESC_COLUMN]}</p></div>`;
  if (keys.length) html+=`<div class="detail-section"><div class="detail-section-label">詳細情報</div>${keys.map(k=>`<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${t[k]}</span></div>`).join('')}</div>`;
  if (flavors.length) html+=`<div class="detail-section"><div class="detail-section-label">フレーバーノート</div><div class="flavor-tags">${flavors.map(f=>`<div class="flavor-tag-d">${f}</div>`).join('')}</div></div>`;
  if (t[CONFIG.URL_COLUMN]) html+=`<button class="detail-link-btn" onclick="window.open('${t[CONFIG.URL_COLUMN]}','_blank')">商品ページを開く ↗</button>`;

  document.getElementById('detail-body').innerHTML=html;
  showPageDirect('detail');
}

function backFromDetail() { showPage(detailFrom); }

// ============================================================
//  NAV
// ============================================================
function showPage(name, btn) {
  const tabs = document.querySelectorAll('.nav-tab');
  if (btn) { tabs.forEach(t=>t.classList.remove('active')); btn.classList.add('active'); }
  else {
    const map={home:0,list:1,menu:2};
    if (map[name]!==undefined) { tabs.forEach(t=>t.classList.remove('active')); if(tabs[map[name]]) tabs[map[name]].classList.add('active'); }
  }
  showPageDirect(name);
}

function showPageDirect(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById('page-'+name);
  if (pg) pg.classList.add('active');
  if (name==='list') { renderFilterDropdowns(); renderFlavorChips(); filterTeas(); }
  if (name==='menu') renderMenu();
  window.scrollTo(0,0);
}

function esc(s) { return (s||'').replace(/'/g,"\\'"); }
</script>
