<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Tea Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #faf7f4;
  color: #2c2420;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== CSS VARIABLES ===== */
:root {
  --tea-deep: #7a3f3f;
  --tea-mid: #b06060;
  --tea-rose: #dea8a8;
  --tea-blush: #f5e8e8;
  --tea-cream: #faf7f4;
  --tea-warm: #c4856a;
  --tea-gold: #c9a84c;
  --tea-sage: #8fa878;
  --tea-mist: #e8e4df;
  --tea-ink: #2c2420;
  --tea-gray: #8a7f7a;
  --shadow-sm: 0 1px 3px rgba(122,63,63,0.08);
  --shadow-md: 0 4px 16px rgba(122,63,63,0.12);
  --shadow-lg: 0 8px 32px rgba(122,63,63,0.16);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
  --max-width: 480px;
}

/* ===== PASSWORD SCREEN ===== */
#pw-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: linear-gradient(160deg, #fdf8f3 0%, #f5e8e8 40%, #ede8f5 100%);
  position: relative;
  overflow: hidden;
}
#pw-screen::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(222,168,168,0.25) 0%, transparent 70%);
  pointer-events: none;
}
#pw-screen::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -80px;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(143,168,120,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.pw-container {
  text-align: center;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.pw-teacup {
  font-size: 56px;
  margin-bottom: 1.5rem;
  display: block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
.pw-title {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 300;
  font-style: italic;
  color: var(--tea-deep);
  line-height: 1.1;
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.pw-subtitle {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--tea-gray);
  margin-bottom: 2.5rem;
}
.pw-form {
  width: 100%;
  max-width: 280px;
  margin: 0 auto;
}
.pw-input-wrap { position: relative; margin-bottom: 12px; }
.pw-input-wrap input {
  width: 100%;
  padding: 12px 20px;
  border: 1.5px solid var(--tea-rose);
  border-radius: 30px;
  font-family: var(--font-body);
  font-size: 15px;
  background: rgba(255,255,255,0.75);
  color: var(--tea-ink);
  text-align: center;
  letter-spacing: 0.15em;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  backdrop-filter: blur(4px);
}
.pw-input-wrap input::placeholder { color: #c4a4a4; letter-spacing: 0.08em; }
.pw-input-wrap input:focus {
  border-color: var(--tea-deep);
  box-shadow: 0 0 0 3px rgba(122,63,63,0.1);
}
.pw-btn {
  width: 100%;
  padding: 12px;
  background: var(--tea-deep);
  color: white;
  border: none;
  border-radius: 30px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-md);
}
.pw-btn:hover { background: #6a3535; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.pw-btn:active { transform: translateY(0); }
.pw-error {
  color: #b04040;
  font-size: 12px;
  margin-top: 10px;
  min-height: 18px;
  text-align: center;
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

/* ===== MAIN APP ===== */
#main-app { display: none; max-width: var(--max-width); margin: 0 auto; }

/* ===== NAV ===== */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250,247,244,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(222,168,168,0.3);
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  color: var(--tea-deep);
  letter-spacing: 0.03em;
}
.nav-logo span { color: var(--tea-rose); }
.nav-tabs { display: flex; gap: 2px; background: var(--tea-mist); border-radius: 20px; padding: 3px; }
.nav-tab {
  padding: 5px 14px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--tea-gray);
  font-family: var(--font-body);
  transition: all 0.2s;
}
.nav-tab.active { background: white; color: var(--tea-deep); box-shadow: var(--shadow-sm); }

/* ===== PAGES ===== */
.page { display: none; animation: pageIn 0.3s ease both; }
.page.active { display: block; }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== HOME PAGE ===== */
.home-hero {
  background: linear-gradient(160deg, #fdf8f3 0%, #f8eaec 55%, #f0e8f5 100%);
  padding: 2rem 1.5rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(222,168,168,0.3) 0%, transparent 70%);
  pointer-events: none;
}
.home-emoji { font-size: 48px; margin-bottom: 10px; display: block; }
.home-title {
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 300;
  font-style: italic;
  color: var(--tea-deep);
  line-height: 1.15;
  margin-bottom: 6px;
}
.home-date {
  font-size: 12px;
  color: var(--tea-gray);
  letter-spacing: 0.06em;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 1rem;
}
.stat-card {
  background: white;
  border-radius: var(--radius-md);
  padding: 14px 8px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(222,168,168,0.2);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 300;
  color: var(--tea-deep);
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: var(--tea-gray);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 3px;
}

.home-section { padding: 0 1rem 1rem; }
.section-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  font-style: italic;
  color: var(--tea-deep);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(222,168,168,0.5), transparent);
}

.brand-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.brand-card {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.2s;
  background: white;
  color: var(--tea-deep);
  border-color: rgba(222,168,168,0.4);
  box-shadow: var(--shadow-sm);
}
.brand-card:hover {
  background: var(--tea-blush);
  border-color: var(--tea-rose);
  transform: translateY(-1px);
}

.expiry-list { display: flex; flex-direction: column; gap: 8px; }
.expiry-item {
  background: white;
  border-radius: var(--radius-md);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(222,168,168,0.15);
  cursor: pointer;
  transition: all 0.2s;
}
.expiry-item:hover { transform: translateX(3px); box-shadow: var(--shadow-md); }
.expiry-item.soon { border-left: 3px solid #e07070; }
.expiry-name { font-size: 13px; font-weight: 500; color: var(--tea-ink); }
.expiry-date { font-size: 11px; color: var(--tea-gray); margin-top: 1px; }
.expiry-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 8px;
  background: #fee8e8;
  color: #b04040;
  font-weight: 500;
  white-space: nowrap;
}

/* ===== TEA LIST PAGE ===== */
.list-header {
  background: white;
  padding: 12px;
  border-bottom: 1px solid rgba(222,168,168,0.2);
  position: sticky;
  top: 56px;
  z-index: 50;
}
.search-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--tea-cream);
  border: 1.5px solid rgba(222,168,168,0.35);
  border-radius: 24px;
  padding: 7px 14px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: var(--tea-deep); }
.search-wrap input {
  border: none;
  background: transparent;
  font-size: 13px;
  color: var(--tea-ink);
  width: 100%;
  outline: none;
  font-family: var(--font-body);
}
.search-wrap input::placeholder { color: var(--tea-gray); }
.search-ico { color: var(--tea-rose); font-size: 15px; flex-shrink: 0; }

.filter-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
.filter-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  background: var(--tea-cream);
  color: var(--tea-gray);
  border: 1.5px solid rgba(222,168,168,0.3);
  font-family: var(--font-body);
  transition: all 0.15s;
  white-space: nowrap;
}
.chip.active { background: var(--tea-deep); color: white; border-color: var(--tea-deep); }
.chip:hover:not(.active) { border-color: var(--tea-rose); color: var(--tea-deep); background: var(--tea-blush); }

.tea-list { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
.tea-card {
  background: white;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  cursor: pointer;
  border: 1px solid rgba(222,168,168,0.2);
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.tea-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--card-accent, var(--tea-rose));
  border-radius: 4px 0 0 4px;
}
.tea-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: rgba(222,168,168,0.4); }
.tea-card:active { transform: translateY(0); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
.card-name {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 400;
  font-style: italic;
  color: var(--tea-ink);
  flex: 1;
  line-height: 1.2;
}
.card-brand-badge {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--tea-gray);
  background: var(--tea-mist);
  padding: 3px 8px;
  border-radius: 8px;
  margin-left: 8px;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 3px;
}
.card-desc {
  font-size: 12px;
  color: var(--tea-gray);
  line-height: 1.6;
  margin-bottom: 9px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 8px;
  letter-spacing: 0.03em;
}
.tag-type { background: #ede8f5; color: #5a3a7a; }
.tag-caffeine-none { background: #e8f5e8; color: #2d6a2d; }
.tag-caffeine-normal { background: #fff3e0; color: #7a4a0a; }
.tag-aroma { background: var(--tea-blush); color: var(--tea-deep); }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--tea-gray);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.5; }
.empty-state p { font-size: 13px; }

/* ===== DETAIL PAGE ===== */
.detail-back {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--tea-deep);
  cursor: pointer;
  background: white;
  border-bottom: 1px solid rgba(222,168,168,0.2);
  font-weight: 500;
  transition: background 0.15s;
}
.detail-back:hover { background: var(--tea-blush); }
.detail-hero {
  background: linear-gradient(160deg, #fdf8f3 0%, #f8eaec 60%, #f0e8f5 100%);
  padding: 2rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.detail-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(222,168,168,0.35) 0%, transparent 70%);
  pointer-events: none;
}
.detail-emoji { font-size: 44px; margin-bottom: 12px; display: block; }
.detail-name {
  font-family: var(--font-display);
  font-size: 34px;
  font-weight: 300;
  font-style: italic;
  color: var(--tea-deep);
  line-height: 1.1;
  margin-bottom: 5px;
}
.detail-brand-label {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--tea-gray);
}
.detail-body { padding: 1rem; }
.detail-section {
  background: white;
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid rgba(222,168,168,0.15);
  box-shadow: var(--shadow-sm);
}
.detail-section-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--tea-rose);
  font-weight: 500;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(222,168,168,0.2);
}
.detail-desc-text {
  font-size: 13px;
  line-height: 1.75;
  color: var(--tea-ink);
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 7px 0;
  font-size: 13px;
  border-bottom: 1px solid rgba(222,168,168,0.12);
}
.detail-row:last-child { border-bottom: none; }
.detail-key { color: var(--tea-gray); flex-shrink: 0; }
.detail-val { color: var(--tea-ink); font-weight: 500; text-align: right; max-width: 65%; line-height: 1.4; }
.aroma-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.aroma-tag {
  padding: 5px 12px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  background: var(--tea-blush);
  color: var(--tea-deep);
  border: 1px solid rgba(222,168,168,0.4);
}
.detail-link-btn {
  display: block;
  width: 100%;
  padding: 13px;
  background: var(--tea-deep);
  color: white;
  border: none;
  border-radius: 30px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  cursor: pointer;
  text-align: center;
  margin-top: 4px;
  box-shadow: var(--shadow-md);
  transition: all 0.2s;
}
.detail-link-btn:hover { background: #6a3535; transform: translateY(-1px); box-shadow: var(--shadow-lg); }

/* ===== LOADING STATE ===== */
.loading {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--tea-gray);
  font-size: 13px;
}
.loading-spin {
  display: inline-block;
  width: 24px; height: 24px;
  border: 2px solid var(--tea-rose);
  border-top-color: var(--tea-deep);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== BOTTOM SAFE AREA ===== */
.bottom-space { height: 24px; }

/* ===== RESPONSIVE ===== */
@media (min-width: 481px) {
  #main-app {
    min-height: 100vh;
    box-shadow: 0 0 40px rgba(122,63,63,0.08);
  }
}
</style>
</head>
<body>

<!-- ==================== PASSWORD SCREEN ==================== -->
<div id="pw-screen">
  <div class="pw-container">
    <span class="pw-teacup">🍵</span>
    <h1 class="pw-title">My Tea<br>Collection</h1>
    <p class="pw-subtitle">Private Tea Library</p>
    <div class="pw-form">
      <div class="pw-input-wrap">
        <input type="password" id="pw-input" placeholder="パスワードを入力してください" autocomplete="off" />
      </div>
      <button class="pw-btn" onclick="checkPw()">Enter ✦</button>
      <p class="pw-error" id="pw-error"></p>
    </div>
  </div>
</div>

<!-- ==================== MAIN APP ==================== -->
<div id="main-app">
  <nav class="nav">
    <div class="nav-logo">Tea <span>✦</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('home', this)">Home</button>
      <button class="nav-tab" onclick="showPage('list', this)">一覧</button>
    </div>
  </nav>

  <!-- HOME -->
  <div id="page-home" class="page active">
    <div class="home-hero">
      <span class="home-emoji">🫖</span>
      <h1 class="home-title">My Tea<br>Collection</h1>
      <p class="home-date" id="home-date"></p>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-total">…</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-brands">…</div><div class="stat-label">Brands</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-types">…</div><div class="stat-label">Types</div></div>
    </div>
    <div class="home-section">
      <div class="section-title">ブランド</div>
      <div class="brand-grid" id="brand-grid"><div class="loading"><div class="loading-spin"></div><br>読み込み中…</div></div>
    </div>
    <div class="home-section">
      <div class="section-title">賞味期限チェック</div>
      <div class="expiry-list" id="expiry-list"></div>
    </div>
    <div class="bottom-space"></div>
  </div>

  <!-- LIST -->
  <div id="page-list" class="page">
    <div class="list-header">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="search-input" placeholder="名前・ブランド・香りで検索…" oninput="filterTeas()" />
      </div>
      <div class="filter-scroll" id="filter-row"></div>
    </div>
    <div class="tea-list" id="tea-list"><div class="loading"><div class="loading-spin"></div><br>読み込み中…</div></div>
    <div class="bottom-space"></div>
  </div>

  <!-- DETAIL -->
  <div id="page-detail" class="page">
    <div class="detail-back" onclick="showPage('list')">← 一覧に戻る</div>
    <div class="detail-hero">
      <span class="detail-emoji">🍵</span>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-brand-label" id="detail-brand"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="bottom-space"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — ここを変更してください
// ============================================================
const CONFIG = {
  // パスワード（変更可能）
  PASSWORD: 'tea2024',

  // Google SpreadsheetのシートをCSV公開したURL
  // スプレッドシート → ファイル → 共有 → ウェブに公開 → CSV のURLを貼り付け
  SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1qMVoiJ7paL9DLLmfiMalRJaqK3mcNfkVujDAojlehIaY1bogsofhBgmhxAwZ1LalxmRcyJ8oK6Wk/pub?gid=0&single=true&output=csv',

  // フィルター可能なカラム名（スプレッドシートのヘッダーと一致させる）
  FILTERABLE_COLUMNS: ['茶種', 'カフェイン量', 'ブランド'],

  // ○/× 表示のアロマ系カラム
  AROMA_COLUMNS: ['キャラメル', 'チョコレート', 'バニラ', 'バラ', '花(バラ以外)', '果物(ベリー)', '果物(柑橘)', '果物(その他)'],

  // ブランドごとのアクセントカラー（追加・変更可能）
  BRAND_COLORS: {
    'MARIAGE FRÈRES': '#8b6355',
    'Art of Tea':     '#6a8b55',
    'TEAPOND':        '#6b558b',
    'LUPICIA':        '#8b7a55',
  },

  // 賞味期限カラム名
  EXPIRY_COLUMN: '賞味期限',

  // 商品名カラム（詳細ページのタイトル）
  NAME_COLUMN: '商品名',

  // 商品URLカラム
  URL_COLUMN: '商品URL',

  // 説明カラム
  DESC_COLUMN: '説明',
};
// ============================================================

let allTeas = [];
let currentFilter = { col: null, val: null };
let navBtns = [];

// ---------- AUTH ----------
function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === CONFIG.PASSWORD) {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initApp();
  } else {
    const err = document.getElementById('pw-error');
    err.textContent = 'パスワードが違います';
    err.style.animation = 'none';
    setTimeout(() => err.style.animation = '', 10);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

// ---------- INIT ----------
function initApp() {
  const now = new Date();
  document.getElementById('home-date').textContent =
    now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  fetchData();
}

// ---------- FETCH CSV ----------
async function fetchData() {
  try {
    const url = CONFIG.SHEET_CSV_URL + '&t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    allTeas = parseCSV(text);
    renderAll();
  } catch (e) {
    console.error(e);
    showError();
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1)
    .map(line => {
      const vals = parseCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
      return obj;
    })
    .filter(t => t[CONFIG.NAME_COLUMN] && t[CONFIG.NAME_COLUMN].trim() !== '');
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function showError() {
  const msg = '<div class="empty-state"><span class="empty-icon">⚠️</span><p>データを読み込めませんでした。<br>スプレッドシートの公開設定を確認してください。</p></div>';
  document.getElementById('brand-grid').innerHTML = msg;
  document.getElementById('tea-list').innerHTML = msg;
}

// ---------- RENDER ALL ----------
function renderAll() {
  renderHome();
  renderFilters();
  renderTeaList(allTeas);
}

// ---------- HOME ----------
function renderHome() {
  const brands = [...new Set(allTeas.map(t => t['ブランド']).filter(Boolean))];
  const types  = [...new Set(allTeas.flatMap(t => (t['茶種'] || '').split(',').map(s => s.trim())).filter(Boolean))];

  document.getElementById('stat-total').textContent  = allTeas.length;
  document.getElementById('stat-brands').textContent = brands.length;
  document.getElementById('stat-types').textContent  = types.length;

  // Brand tags
  document.getElementById('brand-grid').innerHTML = brands.map(b =>
    `<div class="brand-card" onclick="filterByBrand('${b.replace(/'/g,"\\'")}')">
       ${b}
     </div>`
  ).join('');

  // Expiry list
  const sorted = [...allTeas].sort((a, b) => {
    const pa = parseExpiry(a[CONFIG.EXPIRY_COLUMN]);
    const pb = parseExpiry(b[CONFIG.EXPIRY_COLUMN]);
    return pa - pb;
  });
  const now = new Date();
  document.getElementById('expiry-list').innerHTML = sorted.map(t => {
    const d = parseExpiry(t[CONFIG.EXPIRY_COLUMN]);
    const diffDays = Math.ceil((d - now) / 86400000);
    const soon = diffDays <= 60;
    const idx = allTeas.indexOf(t);
    return `<div class="expiry-item${soon ? ' soon' : ''}" onclick="showDetail(${idx})">
      <div>
        <div class="expiry-name">${t[CONFIG.NAME_COLUMN]}</div>
        <div class="expiry-date">賞味期限: ${t[CONFIG.EXPIRY_COLUMN]}</div>
      </div>
      ${soon ? '<span class="expiry-badge">まもなく</span>' : ''}
    </div>`;
  }).join('');
}

function parseExpiry(str) {
  if (!str || str === '-') return new Date('9999-12-31');
  // 形式: YY/MM または YYYY/MM/DD など
  const parts = str.split('/');
  if (parts.length === 2) {
    const y = parseInt(parts[0]) < 100 ? 2000 + parseInt(parts[0]) : parseInt(parts[0]);
    return new Date(y, parseInt(parts[1]) - 1, 1);
  }
  return new Date('9999-12-31');
}

// ---------- FILTERS ----------
function renderFilters() {
  let html = `<div class="chip${!currentFilter.col ? ' active' : ''}" onclick="clearFilter()">すべて</div>`;

  CONFIG.FILTERABLE_COLUMNS.forEach(col => {
    const vals = [...new Set(allTeas.map(t => t[col]).filter(Boolean))];
    vals.forEach(v => {
      const isActive = currentFilter.col === col && currentFilter.val === v;
      const label = col === 'ブランド' ? v.split(/[\s　]/)[0] : (col === 'カフェイン量' ? `カフェイン: ${v}` : v);
      html += `<div class="chip${isActive ? ' active' : ''}" onclick="setFilter('${col}','${v.replace(/'/g,"\\'")}')">
                 ${label}
               </div>`;
    });
  });

  // Aroma filters
  CONFIG.AROMA_COLUMNS.forEach(col => {
    if (allTeas.some(t => t[col] === '○')) {
      const isActive = currentFilter.col === col && currentFilter.val === '○';
      html += `<div class="chip${isActive ? ' active' : ''}" onclick="setFilter('${col}','○')">${col}</div>`;
    }
  });

  document.getElementById('filter-row').innerHTML = html;
}

function setFilter(col, val) {
  currentFilter = { col, val };
  filterTeas();
  renderFilters();
}

function clearFilter() {
  currentFilter = { col: null, val: null };
  filterTeas();
  renderFilters();
}

function filterByBrand(brand) {
  currentFilter = { col: 'ブランド', val: brand };
  showPage('list');
  renderFilters();
  filterTeas();
}

// ---------- FILTER & RENDER LIST ----------
function filterTeas() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = allTeas.filter(t => {
    const matchQ = !q ||
      (t[CONFIG.NAME_COLUMN] || '').toLowerCase().includes(q) ||
      (t['ブランド'] || '').toLowerCase().includes(q) ||
      (t['香り'] || '').toLowerCase().includes(q) ||
      (t[CONFIG.DESC_COLUMN] || '').toLowerCase().includes(q) ||
      (t['原材料'] || '').toLowerCase().includes(q);
    const matchF = !currentFilter.col ||
      (t[currentFilter.col] || '').includes(currentFilter.val);
    return matchQ && matchF;
  });
  renderTeaList(filtered);
}

function renderTeaList(teas) {
  if (!teas.length) {
    document.getElementById('tea-list').innerHTML =
      '<div class="empty-state"><span class="empty-icon">🍵</span><p>該当する紅茶が見つかりませんでした</p></div>';
    return;
  }
  document.getElementById('tea-list').innerHTML = teas.map(t => {
    const idx = allTeas.indexOf(t);
    const color = CONFIG.BRAND_COLORS[t['ブランド']] || '#c4856a';
    const aromas = CONFIG.AROMA_COLUMNS.filter(c => t[c] === '○');
    const cafClass = t['カフェイン量'] === '無' ? 'tag-caffeine-none' : 'tag-caffeine-normal';
    const brandShort = (t['ブランド'] || '').split(/[\s　]/)[0];
    return `<div class="tea-card" style="--card-accent:${color}" onclick="showDetail(${idx})">
      <div class="card-top">
        <div class="card-name">${t[CONFIG.NAME_COLUMN]}</div>
        <div class="card-brand-badge">${brandShort}</div>
      </div>
      <div class="card-desc">${t[CONFIG.DESC_COLUMN] || ''}</div>
      <div class="card-tags">
        <span class="tag tag-type">${t['茶種'] || ''}</span>
        <span class="tag ${cafClass}">カフェイン ${t['カフェイン量'] || ''}</span>
        ${aromas.map(a => `<span class="tag tag-aroma">${a}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ---------- DETAIL ----------
function showDetail(idx) {
  const t = allTeas[idx];
  document.getElementById('detail-name').textContent  = t[CONFIG.NAME_COLUMN] || '';
  document.getElementById('detail-brand').textContent = t['ブランド'] || '';

  const aromas = CONFIG.AROMA_COLUMNS.filter(c => t[c] === '○');

  // Build all rows dynamically — skips AROMA columns and URL/name/brand/desc
  const skipCols = new Set([
    CONFIG.NAME_COLUMN, CONFIG.URL_COLUMN, CONFIG.DESC_COLUMN,
    'ブランド', ...CONFIG.AROMA_COLUMNS
  ]);
  const infoKeys = Object.keys(t).filter(k => !skipCols.has(k) && k.trim() !== '' && t[k] && t[k].trim() !== '' && t[k].trim() !== '​');

  let html = '';

  // Description
  if (t[CONFIG.DESC_COLUMN]) {
    html += `<div class="detail-section">
      <div class="detail-section-label">紹介</div>
      <p class="detail-desc-text">${t[CONFIG.DESC_COLUMN]}</p>
    </div>`;
  }

  // Info rows (dynamic — survives column additions/removals)
  if (infoKeys.length) {
    html += `<div class="detail-section">
      <div class="detail-section-label">詳細情報</div>
      ${infoKeys.map(k => `
        <div class="detail-row">
          <span class="detail-key">${k}</span>
          <span class="detail-val">${t[k]}</span>
        </div>`).join('')}
    </div>`;
  }

  // Aroma notes
  if (aromas.length) {
    html += `<div class="detail-section">
      <div class="detail-section-label">アロマノート</div>
      <div class="aroma-tags">${aromas.map(a => `<div class="aroma-tag">${a}</div>`).join('')}</div>
    </div>`;
  }

  // Link
  if (t[CONFIG.URL_COLUMN]) {
    html += `<button class="detail-link-btn" onclick="window.open('${t[CONFIG.URL_COLUMN]}','_blank')">
               商品ページを開く ↗
             </button>`;
  }

  document.getElementById('detail-body').innerHTML = html;
  showPageDirect('detail');
}

// ---------- PAGE NAV ----------
function showPage(name, btn) {
  if (btn) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  } else {
    // Activate correct tab
    const tabMap = { home: 0, list: 1 };
    if (tabMap[name] !== undefined) {
      const tabs = document.querySelectorAll('.nav-tab');
      tabs.forEach(t => t.classList.remove('active'));
      if (tabs[tabMap[name]]) tabs[tabMap[name]].classList.add('active');
    }
  }
  showPageDirect(name);
}

function showPageDirect(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById('page-' + name);
  if (pg) pg.classList.add('active');
  if (name === 'list') { filterTeas(); renderFilters(); }
  window.scrollTo(0, 0);
}
</script>
